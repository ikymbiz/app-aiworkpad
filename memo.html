<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Memo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; }

        .container {
            display: flex; flex-direction: column; height: 100%;
        }

        /* Header */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; border-bottom: 1px solid #e2e8f0;
            background: #f8fafc; flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .header-icon { font-size: 18px; }
        .header-title {
            font-size: 14px; font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-actions { display: flex; gap: 6px; }

        .btn {
            border: none; border-radius: 8px; padding: 8px 14px;
            font-size: 12px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 4px; transition: all 0.15s;
        }
        .btn-save { background: #3b82f6; color: #fff; }
        .btn-save:active { background: #2563eb; transform: scale(0.96); }
        .btn-open { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .btn-open:active { background: #e2e8f0; }
        .btn-close { background: transparent; color: #94a3b8; font-size: 18px; padding: 4px 8px; }

        /* Title */
        .title-input {
            width: 100%; border: none; outline: none;
            padding: 12px 16px 4px; font-size: 18px; font-weight: 700;
            color: #1e293b; background: transparent;
            flex-shrink: 0;
        }
        .title-input::placeholder { color: #cbd5e1; }

        /* Editor */
        .editor {
            flex: 1; width: 100%; border: none; outline: none;
            padding: 8px 16px 16px; font-size: 15px; line-height: 1.7;
            color: #334155; background: transparent;
            resize: none; font-family: inherit;
        }
        .editor::placeholder { color: #cbd5e1; }

        /* Status bar */
        .status {
            padding: 6px 16px; border-top: 1px solid #f1f5f9;
            font-size: 11px; color: #94a3b8; flex-shrink: 0;
            display: flex; justify-content: space-between;
        }

        /* Toast */
        .toast {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: #fff; padding: 8px 20px;
            border-radius: 20px; font-size: 13px; font-weight: 500;
            opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <span class="header-icon">✏️</span>
                <span class="header-title">Quick Memo</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-open" id="btn-open" onclick="openInApp()">📂 アプリで開く</button>
                <button class="btn btn-save" id="btn-save" onclick="saveMemo()">💾 保存</button>
            </div>
        </div>

        <input type="text" class="title-input" id="memo-title" placeholder="タイトル" autofocus>
        <textarea class="editor" id="memo-editor" placeholder="メモを入力..."></textarea>

        <div class="status">
            <span id="status-text">新規メモ</span>
            <span id="char-count">0 文字</span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const dbDocList = localforage.createInstance({ name: "AIWorkPad", storeName: "docList" });
        const dbDoc = localforage.createInstance({ name: "AIWorkPad", storeName: "document" });

        let currentMemoId = null;
        let saved = false;

        const titleInput = document.getElementById('memo-title');
        const editor = document.getElementById('memo-editor');
        const statusText = document.getElementById('status-text');
        const charCount = document.getElementById('char-count');

        // 文字数カウント
        editor.addEventListener('input', () => {
            charCount.textContent = editor.value.length + ' 文字';
            saved = false;
            statusText.textContent = '未保存';
        });
        titleInput.addEventListener('input', () => {
            saved = false;
            statusText.textContent = '未保存';
        });

        // 保存
        async function saveMemo() {
            const title = titleInput.value.trim() || '無題のメモ';
            const content = editor.value;

            if (!currentMemoId) {
                currentMemoId = 'doc_' + Date.now();
            }

            // ドキュメントリストに追加/更新
            let list = await dbDocList.getItem('list') || [];
            const existing = list.find(d => d.id === currentMemoId);
            if (existing) {
                existing.title = title;
                existing.updatedAt = Date.now();
            } else {
                list.push({
                    id: currentMemoId,
                    title: title,
                    updatedAt: Date.now(),
                    parentId: null,
                    isExpanded: true
                });
            }
            await dbDocList.setItem('list', list);

            // ドキュメント本体を保存
            await dbDoc.setItem(currentMemoId, {
                id: currentMemoId,
                content: content,
                lastModified: new Date().toISOString()
            });

            saved = true;
            statusText.textContent = '保存済み';
            showToast('保存しました');
        }

        // アプリで開く
        async function openInApp() {
            if (!saved && (editor.value || titleInput.value)) {
                await saveMemo();
            }
            // MemoActivity 側の JavascriptInterface で処理
            if (window.MemoInterface) {
                window.MemoInterface.openInApp(currentMemoId || '');
            }
        }

        // 閉じる
        function closeMemo() {
            if (window.MemoInterface) {
                window.MemoInterface.closeMemo();
            }
        }

        // Toast
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1500);
        }

        // 自動保存 (30秒)
        setInterval(() => {
            if (!saved && (editor.value || titleInput.value)) {
                saveMemo();
            }
        }, 30000);

        // 初期フォーカス
        window.addEventListener('load', () => {
            setTimeout(() => editor.focus(), 200);
        });
    </script>
</body>
</html>
