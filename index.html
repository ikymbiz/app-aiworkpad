<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA / ホーム画面保存時のURLバー非表示設定 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AIWorkPad">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href='data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22AIWorkPad%22%2C%22short_name%22%3A%22AIWorkPad%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23ffffff%22%2C%22theme_color%22%3A%22%23ffffff%22%7D'>
    
    <title>AIWorkPad</title>
    <!-- Tailwind CSS with Typography Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- LocalForage (IndexedDB Wrapper) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <!-- Marked.js (Markdown Parser) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        dark: '#0f172a',
                        light: '#f8fafc'
                    }
                }
            }
        }
    </script>
    <style>
        /* モバイルでのキーボード表示時のレイアウト崩れ・ヘッダー見切れ防止 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
        }

        /* カスタムスクロールバー */
        .custom-scrollbar::-webkit-scrollbar,
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track,
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb,
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover,
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        /* エディタのスタイル調整 */
        #editor {
            line-height: 1.8;
            font-size: 16px;
        }

        /* 左サイドバー(ドキュメント一覧)のアニメーション */
        #left-sidebar {
            transition: margin-left 0.3s ease, transform 0.3s ease;
        }
        @media (max-width: 768px) {
            #left-sidebar {
                transform: translateX(-100%);
                margin-left: 0 !important;
            }
            #left-sidebar.open-mobile {
                transform: translateX(0);
            }
        }
        @media (min-width: 769px) {
            #left-sidebar {
                transform: translateX(0) !important;
            }
            #left-sidebar.closed-pc {
                margin-left: -16rem;
            }
        }

        /* 右サイドパネルのアニメーション (モバイル用) */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                top: 0;
                right: -100%;
                width: 85%;
                height: 100vh;
                height: 100dvh;
                z-index: 50;
                transition: right 0.3s ease-in-out;
            }
            #sidebar.open {
                right: 0;
            }
            #sidebar-overlay {
                display: none;
            }
            #sidebar-overlay.open {
                display: block;
            }
        }

        /* トースト通知のアニメーション（下部中央からスライドアップ） */
        .toast-enter {
            animation: fadeInUp 0.3s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* AIアクションシートのカルーセル対応 */
        .ai-action-carousel {
            display: flex;
            gap: 0.25rem;
            overflow-x: auto;
            scroll-behavior: smooth;
        }
        .ai-action-carousel::-webkit-scrollbar { height: 0; width: 0; display: none; }
    </style>
</head>
<body class="bg-light text-slate-800 flex flex-col font-sans">

    <!-- ヘッダー -->
    <header class="bg-white border-b border-slate-200 shadow-sm px-2 sm:px-4 py-3 flex justify-between items-center z-40 shrink-0">
        <div class="flex items-center gap-1 sm:gap-2">
            <button id="btn-toggle-left-sidebar" class="text-slate-500 hover:text-primary transition p-2 rounded-full hover:bg-slate-100" title="ドキュメント一覧">
                <i class="fa-solid fa-folder-tree"></i>
            </button>
            <i class="fa-solid fa-pen-nib text-primary text-base sm:text-xl"></i>
            <h1 class="text-base sm:text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-indigo-500">AIWorkPad</h1>
            <div class="flex flex-col ml-1 sm:ml-2">
                <span id="save-status" class="text-[10px] sm:text-xs text-slate-400 whitespace-nowrap"><i class="fa-solid fa-cloud"></i> 保存済</span>
                <span id="ai-status" class="hidden text-[10px] sm:text-xs text-indigo-500 font-bold whitespace-nowrap"><i class="fa-solid fa-robot fa-spin"></i> 処理中</span>
            </div>
        </div>
        <div class="flex items-center gap-1 sm:gap-3">
            <button id="btn-manual-save" class="text-slate-500 hover:text-primary transition p-2 rounded-full hover:bg-slate-100" title="手動保存">
                <i class="fa-solid fa-save"></i>
            </button>
            <button id="btn-settings" class="text-slate-500 hover:text-primary transition p-2 rounded-full hover:bg-slate-100" title="設定">
                <i class="fa-solid fa-gear"></i>
            </button>
            <button id="btn-toggle-sidebar" class="text-slate-500 hover:text-primary transition p-2 rounded-full hover:bg-slate-100 md:hidden" title="ツールパネル">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </button>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <div class="flex-1 flex overflow-hidden relative">
        
        <!-- 左サイドバーオーバーレイ -->
        <div id="left-sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

        <!-- 左サイドバー (ドキュメント一覧) -->
        <aside id="left-sidebar" class="w-64 bg-slate-50 border-r border-slate-200 flex flex-col shrink-0 absolute md:relative h-full z-50">
            <div class="p-3 border-b border-slate-200 flex justify-between items-center bg-white">
                <span class="font-bold text-slate-700 text-sm"><i class="fa-solid fa-file-lines mr-1 text-primary"></i> ドキュメント</span>
                <button id="btn-new-doc" class="text-slate-400 hover:text-primary transition p-1" title="新規ドキュメント作成">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
            <div id="doc-list" class="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar"></div>
            <button id="btn-close-left-sidebar" class="md:hidden p-3 bg-slate-200 text-center font-bold text-slate-600 text-sm border-t border-slate-300">
                閉じる
            </button>
        </aside>

        <!-- エディタエリア -->
        <main class="flex-1 flex flex-col relative bg-white h-full overflow-hidden">
            <div class="shrink-0 px-4 md:px-8 pt-4 pb-2 border-b border-slate-100 flex items-center gap-2">
                <input type="text" id="doc-title-input" class="w-full text-xl md:text-2xl font-bold text-slate-800 placeholder-slate-300 border-none focus:outline-none focus:ring-0 bg-transparent" placeholder="無題のドキュメント">
            </div>

            <!-- Markdown入力支援ツールバー -->
            <div class="shrink-0 px-2 sm:px-4 md:px-8 py-1.5 bg-slate-50/50 border-b border-slate-200 flex items-center gap-0.5 sm:gap-1 overflow-x-auto custom-scrollbar">
                <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1 sm:p-1.5 md:p-2 rounded transition flex-shrink-0" data-md="h2" title="章タイトル (H2)"><i class="fa-solid fa-heading"></i></button>
                <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1 sm:p-1.5 md:p-2 rounded transition flex-shrink-0" data-md="bold" title="太字"><i class="fa-solid fa-bold"></i></button>
                <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1 sm:p-1.5 md:p-2 rounded transition flex-shrink-0" data-md="italic" title="斜体"><i class="fa-solid fa-italic"></i></button>
                <div class="w-px h-5 bg-slate-300 mx-0.5 sm:mx-1 flex-shrink-0"></div>
                <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1 sm:p-1.5 md:p-2 rounded transition flex-shrink-0" data-md="list-ul" title="箇条書き"><i class="fa-solid fa-list-ul"></i></button>
                
                <div class="flex items-center flex-shrink-0">
                    <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1 sm:p-1.5 md:p-2 rounded-l transition" data-md="list-ol" title="番号付きリスト"><i class="fa-solid fa-list-ol"></i></button>
                    <select id="ol-type-select" class="bg-slate-100 text-slate-500 text-xs focus:outline-none py-1 sm:py-1.5 px-0.5 sm:px-1 border-l border-slate-200 rounded-r cursor-pointer hover:bg-slate-200 transition" title="項番の種類">
                        <option value="1">1.</option>
                        <option value="A">A.</option>
                        <option value="a">a.</option>
                        <option value="I">I.</option>
                        <option value="i">i.</option>
                    </select>
                </div>

                <div class="w-px h-5 bg-slate-300 mx-0.5 sm:mx-1 flex-shrink-0"></div>
                <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1 sm:p-1.5 md:p-2 rounded transition flex-shrink-0" data-md="quote" title="引用"><i class="fa-solid fa-quote-right"></i></button>
                <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1 sm:p-1.5 md:p-2 rounded transition flex-shrink-0" data-md="code" title="コード"><i class="fa-solid fa-code"></i></button>
                <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1 sm:p-1.5 md:p-2 rounded transition flex-shrink-0" data-md="link" title="リンク"><i class="fa-solid fa-link"></i></button>
                
                <div class="flex-1 min-w-[2px]"></div>
                
                <button id="btn-toggle-preview" class="text-slate-500 hover:text-primary hover:bg-primary/10 p-1 sm:p-1.5 md:p-2 rounded transition flex items-center justify-center flex-shrink-0 shadow-sm border border-slate-200 bg-white" title="プレビュー">
                    <i class="fa-solid fa-eye"></i> 
                </button>
            </div>

            <!-- エディタ & プレビュー コンテナ -->
            <div class="flex-1 relative overflow-hidden bg-white">
                <textarea id="editor" class="absolute inset-0 w-full h-full p-4 md:p-8 bg-transparent custom-scrollbar resize-none focus:outline-none" placeholder="Write here... &#10;テキストを選択するとAIメニューが表示されます。"></textarea>
                <div id="editor-preview" class="hidden absolute inset-0 p-4 md:p-8 overflow-y-auto custom-scrollbar prose prose-sm md:prose-base prose-slate max-w-none bg-white z-10 pb-20"></div>

                <!-- AIアクションシート (横スクロール対応) -->
                <div id="ai-action-sheet" class="absolute bg-white border border-slate-200 shadow-xl z-20 rounded-lg p-2 transition-opacity duration-200 opacity-0 pointer-events-none hidden max-w-[90vw]">
                    <div class="flex items-center justify-between mb-1 px-1 border-b border-slate-100 pb-1 shrink-0">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">AIメニュー</span>
                        <button id="btn-close-actions" class="text-slate-300 hover:text-slate-500 p-1"><i class="fa-solid fa-times text-xs"></i></button>
                    </div>
                    <div class="ai-action-carousel">
                        <button class="ai-action-btn flex flex-col items-center p-2 rounded hover:bg-blue-50 text-primary transition min-w-[55px]" data-action="elaborate">
                            <i class="fa-solid fa-feather-pointed text-sm mb-1"></i><span class="text-[9px] font-medium whitespace-nowrap">詳細化</span>
                        </button>
                        <button class="ai-action-btn flex flex-col items-center p-2 rounded hover:bg-blue-50 text-primary transition min-w-[55px]" data-action="clean">
                            <i class="fa-solid fa-broom text-sm mb-1"></i><span class="text-[9px] font-medium whitespace-nowrap">きれい化</span>
                        </button>
                        <button class="ai-action-btn flex flex-col items-center p-2 rounded hover:bg-blue-50 text-primary transition min-w-[55px]" data-action="summarize">
                            <i class="fa-solid fa-compress text-sm mb-1"></i><span class="text-[9px] font-medium whitespace-nowrap">要約</span>
                        </button>
                        <button class="ai-action-btn flex flex-col items-center p-2 rounded hover:bg-blue-50 text-primary transition min-w-[55px]" data-action="refine">
                            <i class="fa-solid fa-wand-magic-sparkles text-sm mb-1"></i><span class="text-[9px] font-medium whitespace-nowrap">表現修整</span>
                        </button>
                        <button class="ai-action-btn flex flex-col items-center p-2 rounded hover:bg-blue-50 text-primary transition min-w-[55px]" data-action="structure">
                            <i class="fa-solid fa-list-ul text-sm mb-1"></i><span class="text-[9px] font-medium whitespace-nowrap">構造化</span>
                        </button>
                        <div class="w-px bg-slate-200 mx-1 shrink-0"></div>
                        <button class="ai-action-btn flex flex-col items-center p-2 rounded hover:bg-blue-50 text-primary transition min-w-[55px]" data-action="research">
                            <i class="fa-solid fa-magnifying-glass text-sm mb-1"></i><span class="text-[9px] font-medium whitespace-nowrap">深掘調査</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- モバイル用 右サイドパネルオーバーレイ -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40"></div>

        <!-- 右サイドパネル -->
        <aside id="sidebar" class="w-80 bg-slate-50 border-l border-slate-200 flex flex-col shrink-0 shadow-xl md:shadow-none md:static md:right-auto md:h-auto">
            <div class="flex border-b border-slate-200 bg-white overflow-x-auto custom-scrollbar">
                <button class="tab-btn flex flex-col items-center justify-center min-w-[60px] flex-1 py-2 text-[10px] sm:text-xs font-medium text-primary border-b-2 border-primary gap-1" data-target="tab-chat">
                    <i class="fa-solid fa-comments text-sm"></i>チャット
                </button>
                <button class="tab-btn flex flex-col items-center justify-center min-w-[60px] flex-1 py-2 text-[10px] sm:text-xs font-medium text-slate-500 hover:text-slate-700 gap-1" data-target="tab-draft">
                    <i class="fa-solid fa-file-pen text-sm"></i>生成
                </button>
                <button class="tab-btn flex flex-col items-center justify-center min-w-[60px] flex-1 py-2 text-[10px] sm:text-xs font-medium text-slate-500 hover:text-slate-700 gap-1" data-target="tab-toc">
                    <i class="fa-solid fa-list text-sm"></i>目次
                </button>
                <button class="tab-btn flex flex-col items-center justify-center min-w-[60px] flex-1 py-2 text-[10px] sm:text-xs font-medium text-slate-500 hover:text-slate-700 gap-1" data-target="tab-history">
                    <i class="fa-solid fa-clock-rotate-left text-sm"></i>履歴
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 flex flex-col custom-scrollbar relative pb-20 md:pb-4">
                
                <!-- AIチャットタブ -->
                <div id="tab-chat" class="tab-content active h-full flex flex-col">
                    <div class="flex gap-2 mb-2">
                        <select id="chat-persona" class="flex-1 bg-white border border-slate-200 text-xs rounded p-1 text-slate-600 focus:outline-none"></select>
                        <select id="chat-model" class="w-24 bg-white border border-slate-200 text-xs rounded p-1 text-slate-600 focus:outline-none">
                            <option value="gemini">Gemini</option>
                            <option value="claude">Claude</option>
                        </select>
                    </div>
                    <div class="flex justify-between items-center mb-2 px-1 border-b border-slate-100 pb-1">
                        <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">アシスタント</h3>
                        <button id="btn-clear-chat" class="text-xs text-red-400 hover:text-red-600"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <div id="chat-list" class="flex-1 overflow-y-auto space-y-3 pb-2 custom-scrollbar"></div>
                    <div class="mt-2 pt-2 border-t border-slate-200 shrink-0">
                        <div class="flex flex-wrap gap-2 mb-2 text-[10px] text-slate-500 font-medium">
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="chat-ctx-doc" class="rounded text-primary">ドキュメント全体を含める</label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="chat-ctx-sel" class="rounded text-primary">選択中テキストを含める</label>
                        </div>
                        <div class="flex gap-2 items-end">
                            <textarea id="chat-input" class="flex-1 bg-white border border-slate-300 rounded-lg p-2 text-sm resize-none focus:outline-none focus:ring-1 focus:ring-primary shadow-inner custom-scrollbar" rows="2" placeholder="メッセージを入力... (Enterで改行)"></textarea>
                            <button id="btn-send-chat" class="h-10 w-10 shrink-0 bg-primary text-white rounded-lg hover:bg-blue-600 transition flex items-center justify-center shadow-md"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>

                <!-- 記事生成 (Draft) タブ -->
                <div id="tab-draft" class="tab-content hidden h-full flex-col">
                    <div class="flex gap-2 mb-2">
                        <select id="draft-persona" class="flex-1 bg-white border border-slate-200 text-xs rounded p-1 text-slate-600 focus:outline-none"></select>
                        <select id="draft-model" class="w-24 bg-white border border-slate-200 text-xs rounded p-1 text-slate-600 focus:outline-none">
                            <option value="gemini">Gemini</option>
                            <option value="claude">Claude</option>
                        </select>
                    </div>
                    <label class="text-[10px] font-bold text-slate-500 mb-1">生成指示 (テーマ, ターゲット等)</label>
                    <textarea id="draft-instruction" class="w-full h-24 p-2 border border-slate-300 rounded text-sm mb-2 resize-none custom-scrollbar focus:outline-none focus:ring-1 focus:ring-primary" placeholder="例: 初心者向けの解説記事。親しみやすいトーンで。"></textarea>
                    
                    <label class="text-[10px] font-bold text-slate-500 mb-1">参照範囲</label>
                    <select id="draft-context" class="w-full bg-white border border-slate-300 text-sm rounded p-2 mb-3 focus:outline-none">
                        <option value="none">ゼロから作成 (参照なし)</option>
                        <option value="doc">現在のドキュメント全体を参考</option>
                        <option value="sel">選択中のテキストを参考</option>
                    </select>

                    <button id="btn-generate-draft" class="w-full bg-indigo-500 text-white font-bold py-2 rounded-lg hover:bg-indigo-600 transition shadow mb-3 flex justify-center items-center gap-2">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> 記事を生成
                    </button>

                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">プレビュー</span>
                        <button id="btn-clear-draft" class="text-[10px] text-slate-400 hover:text-slate-600"><i class="fa-solid fa-eraser"></i> クリア</button>
                    </div>
                    <div id="draft-preview" class="flex-1 bg-slate-100/50 border border-slate-200 rounded p-2 overflow-y-auto custom-scrollbar text-xs prose prose-sm max-w-none text-slate-600">
                        生成された記事がここに表示されます。
                    </div>

                    <!-- フッター固定アクション (Draft用) -->
                    <div class="fixed md:absolute bottom-0 left-0 right-0 p-3 bg-white border-t border-slate-200 flex gap-2 z-10">
                        <button id="btn-draft-insert" class="flex-1 py-2 text-xs font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition">
                            末尾に挿入
                        </button>
                        <button id="btn-draft-new" class="flex-1 py-2 text-xs font-bold text-white bg-primary hover:bg-blue-600 rounded-lg transition shadow-md">
                            新規保存
                        </button>
                    </div>
                </div>

                <!-- 目次タブ -->
                <div id="tab-toc" class="tab-content hidden flex-col">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">ドキュメント構造</h3>
                    <ul id="toc-list" class="space-y-1 text-sm"></ul>
                </div>

                <!-- 履歴タブ -->
                <div id="tab-history" class="tab-content hidden flex-col">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">バージョン履歴</h3>
                    <div id="history-list" class="space-y-2"></div>
                </div>
            </div>
            
            <button id="btn-close-sidebar-mobile" class="md:hidden p-4 bg-slate-200 text-center font-bold text-slate-600 shrink-0 border-t border-slate-300 z-20">
                閉じる
            </button>
        </aside>
    </div>

    <!-- 深掘り調査モーダル -->
    <div id="research-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-700"><i class="fa-solid fa-magnifying-glass text-primary mr-2"></i>深掘り調査の設定</h3>
                <button id="btn-close-modal" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-times text-lg"></i></button>
            </div>
            <div class="p-4 flex-1">
                <p class="text-sm text-slate-600 mb-2">選択したテキストを元に調査を行います。</p>
                <textarea id="research-prompt" class="w-full h-32 p-3 border border-slate-300 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm custom-scrollbar" placeholder="追加の指示..."></textarea>
            </div>
            <div class="p-4 border-t border-slate-100 flex justify-end gap-2 bg-slate-50">
                <button id="btn-cancel-research" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-200 rounded-lg">キャンセル</button>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">

                <!-- APIキー設定 -->

                    <label class="block text-xs font-medium text-slate-600 mb-1">Claude APIキー (オプション)</label>
                    <input type="password" id="input-claude-key" class="w-full p-2 border border-slate-300 rounded focus:outline-none focus:ring-1 focus:ring-primary text-sm" placeholder="sk-ant-...">
                </div>

                <!-- 基本設定 -->
                <div>
                    <h4 class="text-sm font-bold text-slate-700 mb-2 border-b pb-1">基本設定</h4>
                    <label class="block text-xs font-medium text-slate-600 mb-1">デフォルトAIモデル</label>
                    <div class="flex gap-4 mb-3">
                        <label class="flex items-center gap-1 text-sm"><input type="radio" name="defaultModel" value="gemini" checked> Gemini</label>
                        <label class="flex items-center gap-1 text-sm"><input type="radio" name="defaultModel" value="claude"> Claude</label>
                    </div>

                    <label class="block text-xs font-medium text-slate-600 mb-1">トースト通知</label>
                    <div class="space-y-1 text-sm text-slate-600">
                        <label class="flex items-center gap-2"><input type="checkbox" id="pref-notify-ai" checked class="rounded"> AI処理完了通知</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="pref-notify-save" checked class="rounded"> 保存完了通知</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="pref-notify-error" checked class="rounded"> エラー通知</label>
                    </div>
                </div>

                <!-- AIパーソナリティ管理 -->
                <div>
                    <h4 class="text-sm font-bold text-slate-700 mb-2 border-b pb-1">AIパーソナリティ管理</h4>
                    <div id="settings-persona-list" class="space-y-2 mb-3 max-h-32 overflow-y-auto custom-scrollbar border border-slate-100 rounded p-1 bg-slate-50"></div>
                    <div class="flex flex-col gap-2 bg-slate-50 p-2 rounded border border-slate-200">
                        <input type="text" id="input-persona-name" placeholder="役割名 (例: 要約専門家)" class="p-1.5 border border-slate-300 rounded text-xs focus:outline-none">
                        <textarea id="input-persona-prompt" placeholder="システムプロンプト (あなたはプロの...)" class="p-1.5 border border-slate-300 rounded text-xs resize-none h-16 custom-scrollbar focus:outline-none"></textarea>
                        <button id="btn-add-persona" class="bg-secondary text-white py-1.5 rounded text-xs hover:bg-slate-600 transition">新規追加</button>
                    </div>
                </div>
            </div>
            <div class="p-4 border-t border-slate-100 flex justify-end gap-2 bg-slate-50 shrink-0">
                <button id="btn-save-settings" class="px-6 py-2 text-sm font-medium bg-primary text-white hover:bg-blue-600 rounded-lg shadow-md transition">保存</button>
            </div>
        </div>
    </div>

    <!-- トースト通知コンテナ (下部中央配置) -->
    <div id="toast-container" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 z-[60] flex flex-col gap-2 pointer-events-none items-center w-full px-4"></div>

    <script>
        // ==========================================
        // 定数・初期設定・グローバル変数
        // ==========================================
        const SAVE_INTERVAL = 5 * 60 * 1000;
        
        let currentDocId = null;
        let currentContent = "";
        let selectionRange = { start: 0, end: 0, text: "" };
        let isProcessing = false;
        let typingTimer;
        let wakeLock = null;
        let draftContentCache = "";
        
        // Settings State
        let appSettings = {
            geminiKey: '',
            claudeKey: '',
            defaultModel: 'gemini',
            notifySave: true,
            notifyAI: true,
            notifyError: true,
            personas: [
                { id: 'default', name: '汎用アシスタント', prompt: 'あなたは優秀なAIアシスタントです。ユーザーの指示に簡潔かつ正確に応答してください。' },
                { id: 'writer', name: '記事ライター', prompt: 'あなたはプロのWebライターです。読者の興味を惹きつける、論理的で魅力的な文章を作成してください。' },
                { id: 'editor', name: '校正・要約者', prompt: 'あなたはプロの編集者です。文章の意図を汲み取りつつ、不要な部分を削ぎ落とし、洗練された文章に整えてください。' }
            ]
        };

        // DB Stores
        const dbDocList = localforage.createInstance({ name: "AIWorkPad", storeName: "docList" });
        const dbDoc = localforage.createInstance({ name: "AIWorkPad", storeName: "document" });
        const dbHistory = localforage.createInstance({ name: "AIWorkPad", storeName: "history" });
        const dbChat = localforage.createInstance({ name: "AIWorkPad", storeName: "chat" });
        const dbSettings = localforage.createInstance({ name: "AIWorkPad", storeName: "settings" });

        // DOM Elements
        const docTitleInput = document.getElementById('doc-title-input');
        const editor = document.getElementById('editor');
        const editorPreview = document.getElementById('editor-preview');
        const btnTogglePreview = document.getElementById('btn-toggle-preview');
        const aiActionSheet = document.getElementById('ai-action-sheet');
        const saveStatus = document.getElementById('save-status');
        const aiStatus = document.getElementById('ai-status');
        const tocList = document.getElementById('toc-list');
        const historyList = document.getElementById('history-list');
        const docListEl = document.getElementById('doc-list');
        const olTypeSelect = document.getElementById('ol-type-select');

        // ==========================================
        // AI Web Worker (Gemini & Claude 対応)
        // ==========================================
        const aiWorkerCode = `
        self.onmessage = async function(e) {
            const { aiModel, apiKey, prompt, systemPrompt, actionName, mode } = e.data;
            try {
                let resultText = '';
                if (aiModel === 'claude') {
                    // Anthropic API Call (Requires proper CORS handling or proxy in prod, using direct for standard spec)
                    const res = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'x-api-key': apiKey,
                            'anthropic-version': '2023-06-01',
                            'anthropic-dangerously-allow-browser': 'true',
                            'content-type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'claude-3-haiku-20240307',
                            max_tokens: 4000,
                            system: systemPrompt || '',
                            messages: [{ role: 'user', content: prompt }]
                        })
                    });
                    if (!res.ok) {
                        const err = await res.json().catch(()=>({}));
                        throw new Error(err.error?.message || 'Claude API Error');
                    }
                    const data = await res.json();
                    resultText = data.content?.[0]?.text || '';
                } else {
                    // Gemini API Call
                    const endpoint = \`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=\${apiKey}\`;
                    const body = { contents: [{ role: 'user', parts: [{ text: prompt }] }] };
                    if (systemPrompt) body.systemInstruction = { parts: [{ text: systemPrompt }] };
                    
                    const res = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (!res.ok) {
                        const err = await res.json().catch(()=>({}));
                        throw new Error(err.error?.message || 'Gemini API Error');
                    }
                    const data = await res.json();
                    resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
                }
                self.postMessage({ success: true, resultText, actionName, mode });
            } catch (error) {
                self.postMessage({ success: false, error: error.message, actionName, mode });
            }
        };
        `;
        const aiWorkerBlob = new Blob([aiWorkerCode], { type: 'application/javascript' });
        const aiWorker = new Worker(URL.createObjectURL(aiWorkerBlob));

        function runAIWorker(taskData) {
            return new Promise((resolve, reject) => {
                const handler = (e) => {
                    aiWorker.removeEventListener('message', handler);
                    if (e.data.success) resolve(e.data);
                    else reject(new Error(e.data.error));
                };
                aiWorker.addEventListener('message', handler);
                aiWorker.postMessage(taskData);
            });
        }

        // ==========================================
        // ユーティリティ & UI
        // ==========================================
        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }
            catch (err) { console.warn('Wake Lock error:', err); }
        }
        async function releaseWakeLock() {
            if (wakeLock !== null) { await wakeLock.release(); wakeLock = null; }
        }

        function setAIProcessingState(isProc) {
            isProcessing = isProc;
            if (isProc) {
                aiStatus.classList.remove('hidden');
                saveStatus.classList.add('hidden');
            } else {
                aiStatus.classList.add('hidden');
                saveStatus.classList.remove('hidden');
            }
        }

        function showToast(message, type = 'info', isPersistent = false) {
            // 設定によるフィルタ
            if (type === 'save' && !appSettings.notifySave) return;
            if (type === 'aiComplete' && !appSettings.notifyAI) return;
            if (type === 'error' && !appSettings.notifyError) return;

            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const id = 'toast-' + Date.now();
            toast.id = id;
            
            let bgClass = 'bg-slate-800 text-white'; let icon = 'fa-info-circle'; let duration = 2000;
            if (type === 'success' || type === 'save' || type === 'aiComplete') { bgClass = 'bg-green-600 text-white'; icon = 'fa-check-circle'; duration = 2000; }
            if (type === 'error') { bgClass = 'bg-red-500 text-white'; icon = 'fa-exclamation-triangle'; duration = 3000; }
            if (type === 'warning') { bgClass = 'bg-amber-500 text-white'; icon = 'fa-exclamation-circle'; duration = 2000; }
            if (type === 'info') { duration = 2000; }

            toast.className = `toast-enter ${bgClass} bg-opacity-90 px-4 py-2.5 rounded-full shadow-lg flex items-center gap-2 pointer-events-auto max-w-xs w-max text-sm mx-auto`;
            const iconHtml = isPersistent ? `<i class="fa-solid fa-circle-notch fa-spin"></i>` : `<i class="fa-solid ${icon}"></i>`;

            toast.innerHTML = `${iconHtml}<span class="font-medium truncate">${message}</span>`;
            
            // 下から積むため先頭に追加
            container.insertBefore(toast, container.firstChild);

            if (!isPersistent) setTimeout(() => removeToast(id), duration);
            return id;
        }

        function removeToast(id) {
            const toast = document.getElementById(id);
            if (toast) {
                toast.style.opacity = '0'; toast.style.transform = 'translateY(100%)'; toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }
        }

        // ==========================================
        // 初期化・設定ロード
        // ==========================================
        async function loadSettings() {
            const saved = await dbSettings.getItem('appSettings');
            if (saved) appSettings = { ...appSettings, ...saved };
            updatePersonaSelects();
        }

        async function init() {
            await loadSettings();
            setupEventListeners();
            await loadDocumentList();
            
            setInterval(() => {
                if(currentContent.trim() !== "" || docTitleInput.value.trim() !== "") {
                    saveDocument(); saveVersion('auto', '定期自動保存');
                }
            }, SAVE_INTERVAL);

            // レジュームチェック
            const pendingTask = await dbSettings.getItem('pendingAI');
            if (pendingTask) {
                if(confirm("前回中断されたAI処理があります。再開しますか？")) {
                    await dbSettings.removeItem('pendingAI');
                    executeAITask(pendingTask.prompt, pendingTask.actionName, pendingTask.mode, pendingTask.model, pendingTask.systemPrompt);
                } else {
                    await dbSettings.removeItem('pendingAI');
                }
            }
        }

        // ==========================================
        // 設定UI管理
        // ==========================================
        function updatePersonaSelects() {
            const selects = [document.getElementById('chat-persona'), document.getElementById('draft-persona')];
            const html = appSettings.personas.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            selects.forEach(sel => sel.innerHTML = html);
            
            document.getElementById('chat-model').value = appSettings.defaultModel;
            document.getElementById('draft-model').value = appSettings.defaultModel;
        }

        function renderSettingsPersonaList() {
            const listEl = document.getElementById('settings-persona-list');
            listEl.innerHTML = '';
            appSettings.personas.forEach(p => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-start border-b border-slate-200 pb-1 last:border-0';
                div.innerHTML = `
                    <div class="flex-1 pr-2">
                        <div class="text-xs font-bold text-slate-700">${p.name}</div>
                        <div class="text-[10px] text-slate-500 line-clamp-1">${p.prompt}</div>
                    </div>
                    ${p.id !== 'default' ? `<button class="text-red-400 hover:text-red-600 text-xs px-1 btn-del-persona" data-id="${p.id}"><i class="fa-solid fa-trash"></i></button>` : ''}
                `;
                if(p.id !== 'default') {
                    div.querySelector('.btn-del-persona').addEventListener('click', (e) => {
                        appSettings.personas = appSettings.personas.filter(x => x.id !== p.id);
                        renderSettingsPersonaList();
                    });
                }
                listEl.appendChild(div);
            });
        }

        // ==========================================
        // イベントリスナー
        // ==========================================
        function setupEventListeners() {
            // エディタ入力
            docTitleInput.addEventListener('input', () => { updateSaveStatus("未保存", "text-amber-500", "fa-pen"); triggerSave(); });
            editor.addEventListener('input', () => {
                currentContent = editor.value; updateSaveStatus("未保存", "text-amber-500", "fa-pen");
                triggerSave(true);
            });
            function triggerSave(updateToc = false) {
                clearTimeout(typingTimer);
                typingTimer = setTimeout(async () => { await saveDocument(); if(updateToc) updateTOC(); }, 1000);
            }

            // Markdown ツールバー
            document.querySelectorAll('.toolbar-btn').forEach(btn => {
                btn.addEventListener('mousedown', e => e.preventDefault());
                btn.addEventListener('click', (e) => applyMarkdownFormat(e.currentTarget.dataset.md));
            });
            btnTogglePreview.addEventListener('click', togglePreviewMode);
            document.addEventListener('selectionchange', handleSelection);
            
            // AIアクションシート
            document.getElementById('btn-close-actions').addEventListener('mousedown', e => e.preventDefault());
            document.getElementById('btn-close-actions').addEventListener('click', hideActionSheet);
            document.querySelectorAll('.ai-action-btn').forEach(btn => {
                btn.addEventListener('mousedown', e => e.preventDefault());
                btn.addEventListener('click', (e) => handleAIAction(e.currentTarget.dataset.action));
            });

            // レイアウトトグル
            const toggleLeftSidebar = () => {
                const sidebar = document.getElementById('left-sidebar');
                if (window.innerWidth > 768) sidebar.classList.toggle('closed-pc');
                else {
                    const isOpen = sidebar.classList.toggle('open-mobile');
                    document.getElementById('left-sidebar-overlay').classList.toggle('hidden', !isOpen);
                }
            };
            document.getElementById('btn-toggle-left-sidebar').addEventListener('click', toggleLeftSidebar);
            document.getElementById('btn-close-left-sidebar').addEventListener('click', toggleLeftSidebar);
            document.getElementById('left-sidebar-overlay').addEventListener('click', toggleLeftSidebar);

            const toggleRightSidebar = () => {
                document.getElementById('sidebar').classList.toggle('open');
                document.getElementById('sidebar-overlay').classList.toggle('open');
            };
            document.getElementById('btn-toggle-sidebar').addEventListener('click', toggleRightSidebar);
            document.getElementById('btn-close-sidebar-mobile').addEventListener('click', toggleRightSidebar);
            document.getElementById('sidebar-overlay').addEventListener('click', toggleRightSidebar);

            // 右パネルタブ
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.remove('text-primary', 'border-b-2', 'border-primary'); b.classList.add('text-slate-500');
                    });
                    e.currentTarget.classList.remove('text-slate-500'); e.currentTarget.classList.add('text-primary', 'border-b-2', 'border-primary');
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden', 'flex-col'));
                    const target = document.getElementById(e.currentTarget.dataset.target);
                    target.classList.remove('hidden'); target.classList.add('flex-col');
                });
            });

            document.getElementById('btn-new-doc').addEventListener('click', createNewDocument);
            document.getElementById('btn-manual-save').addEventListener('click', () => { saveDocument(); saveVersion('manual', '手動保存'); });

            // 設定モーダル
            document.getElementById('btn-settings').addEventListener('click', () => {
                document.getElementById('input-api-key').value = appSettings.geminiKey;
                document.getElementById('input-claude-key').value = appSettings.claudeKey;
                document.querySelector(`input[name="defaultModel"][value="${appSettings.defaultModel}"]`).checked = true;
                document.getElementById('pref-notify-ai').checked = appSettings.notifyAI;
                document.getElementById('pref-notify-save').checked = appSettings.notifySave;
                document.getElementById('pref-notify-error').checked = appSettings.notifyError;
                renderSettingsPersonaList();
                document.getElementById('settings-modal').classList.remove('hidden');
            });
            document.getElementById('btn-close-settings').addEventListener('click', () => document.getElementById('settings-modal').classList.add('hidden'));
            
            document.getElementById('btn-add-persona').addEventListener('click', () => {
                const name = document.getElementById('input-persona-name').value.trim();
                const prompt = document.getElementById('input-persona-prompt').value.trim();
                if(name && prompt) {
                    appSettings.personas.push({ id: 'p_'+Date.now(), name, prompt });
                    document.getElementById('input-persona-name').value = '';
                    document.getElementById('input-persona-prompt').value = '';
                    renderSettingsPersonaList();
                }
            });

            document.getElementById('btn-save-settings').addEventListener('click', async () => {
                appSettings.geminiKey = document.getElementById('input-api-key').value.trim();
                appSettings.claudeKey = document.getElementById('input-claude-key').value.trim();
                appSettings.defaultModel = document.querySelector('input[name="defaultModel"]:checked').value;
                appSettings.notifyAI = document.getElementById('pref-notify-ai').checked;
                appSettings.notifySave = document.getElementById('pref-notify-save').checked;
                appSettings.notifyError = document.getElementById('pref-notify-error').checked;
                await dbSettings.setItem('appSettings', appSettings);
                updatePersonaSelects();
                document.getElementById('settings-modal').classList.add('hidden');
                showToast('設定を保存しました', 'save');
            });

            // リサーチモーダル
            document.getElementById('btn-close-modal').addEventListener('click', () => document.getElementById('research-modal').classList.add('hidden'));
            document.getElementById('btn-cancel-research').addEventListener('click', () => document.getElementById('research-modal').classList.add('hidden'));
            document.getElementById('btn-execute-research').addEventListener('click', executeResearch);

            // チャット
            document.getElementById('btn-send-chat').addEventListener('click', sendChatMessage);
            document.getElementById('chat-input').addEventListener('keydown', (e) => {
                // Enterは改行のみ（ネイティブ動作に委ねるため特にpreventDefaultしない。送信はボタンのみ）
            });
            document.getElementById('btn-clear-chat').addEventListener('click', async () => {
                if(confirm('チャット履歴をクリアしますか？')) {
                    const keys = await dbChat.keys();
                    for(let k of keys) {
                        const item = await dbChat.getItem(k);
                        if(item.docId === currentDocId) await dbChat.removeItem(k);
                    }
                    await loadChatHistory();
                }
            });

            // Draft
            document.getElementById('btn-generate-draft').addEventListener('click', generateDraft);
            document.getElementById('btn-draft-insert').addEventListener('click', () => {
                if(draftContentCache) { insertTextAtCursor(`\n\n${draftContentCache}\n`); showToast('末尾に挿入しました', 'success'); }
            });
            document.getElementById('btn-draft-new').addEventListener('click', async () => {
                if(draftContentCache) {
                    await createNewDocument();
                    editor.value = draftContentCache; currentContent = draftContentCache;
                    docTitleInput.value = "AIドラフト: " + new Date().toLocaleDateString();
                    await saveDocument(); updateTOC(); showToast('新規ドキュメントとして保存しました', 'success');
                }
            });
            document.getElementById('btn-clear-draft').addEventListener('click', () => {
                draftContentCache = ""; document.getElementById('draft-preview').innerHTML = '生成された記事がここに表示されます。';
            });
        }

        // ==========================================
        // UI Helpers & Markdown
        // ==========================================
        function togglePreviewMode() {
            const isPreview = !editorPreview.classList.contains('hidden');
            if (isPreview) {
                editorPreview.classList.add('hidden'); editor.classList.remove('hidden');
                btnTogglePreview.innerHTML = '<i class="fa-solid fa-eye"></i>';
                btnTogglePreview.classList.remove('bg-primary/10', 'text-primary');
                editor.focus();
            } else {
                editor.classList.add('hidden'); editorPreview.classList.remove('hidden');
                btnTogglePreview.innerHTML = '<i class="fa-solid fa-pen"></i>';
                btnTogglePreview.classList.add('bg-primary/10', 'text-primary');
                const titleMarkdown = docTitleInput.value.trim() ? `# ${docTitleInput.value.trim()}\n\n` : '';
                editorPreview.innerHTML = marked.parse(titleMarkdown + (editor.value || '*何も書かれていません*'));
                hideActionSheet();
            }
        }

        function getCaretCoordinates(element, position) {
            const div = document.createElement('div');
            const style = div.style;
            const computed = window.getComputedStyle(element);
            style.whiteSpace = 'pre-wrap'; style.wordWrap = 'break-word'; style.position = 'absolute'; style.visibility = 'hidden';
            ['direction', 'boxSizing', 'width', 'height', 'overflowX', 'overflowY', 'borderTopWidth', 'borderLeftWidth', 'paddingTop', 'paddingLeft', 'fontSize', 'lineHeight', 'fontFamily'].forEach(prop => { style[prop] = computed[prop]; });
            div.textContent = element.value.substring(0, position);
            const span = document.createElement('span'); span.textContent = element.value.substring(position) || '.';
            div.appendChild(span); element.parentNode.appendChild(div);
            const coords = { top: span.offsetTop, left: span.offsetLeft, height: parseInt(computed['lineHeight']) };
            element.parentNode.removeChild(div); return coords;
        }

        function handleSelection() {
            if (!editorPreview.classList.contains('hidden')) return;
            if (document.activeElement === editor) {
                const start = editor.selectionStart; const end = editor.selectionEnd;
                const text = editor.value.substring(start, end).trim();
                if (text.length > 0) {
                    selectionRange = { start, end, text };
                    showActionSheet();
                } else hideActionSheet();
            }
        }

        function showActionSheet() {
            if (isProcessing || !selectionRange.text) return;
            aiActionSheet.classList.remove('hidden');
            requestAnimationFrame(() => {
                const coords = getCaretCoordinates(editor, selectionRange.end);
                let top = coords.top - editor.scrollTop + coords.height + 5;
                let left = coords.left - editor.scrollLeft;
                const containerRect = editor.parentNode.getBoundingClientRect();
                if (left + aiActionSheet.offsetWidth > containerRect.width) left = containerRect.width - aiActionSheet.offsetWidth - 10;
                if (top + aiActionSheet.offsetHeight > containerRect.height) top = coords.top - editor.scrollTop - aiActionSheet.offsetHeight - 5;
                aiActionSheet.style.transform = `translate(${Math.max(10, left)}px, ${Math.max(10, top)}px)`;
                aiActionSheet.style.opacity = '1'; aiActionSheet.style.pointerEvents = 'auto';
            });
        }
        function hideActionSheet() {
            aiActionSheet.style.opacity = '0'; aiActionSheet.style.pointerEvents = 'none';
            setTimeout(() => { if (aiActionSheet.style.opacity === '0') aiActionSheet.classList.add('hidden'); }, 200);
        }

        function insertTextAtCursor(text) {
            if (!editorPreview.classList.contains('hidden')) togglePreviewMode(); 
            const pos = editor.selectionStart;
            editor.value = editor.value.substring(0, pos) + text + editor.value.substring(pos);
            editor.dispatchEvent(new Event('input'));
            editor.focus(); editor.setSelectionRange(pos + text.length, pos + text.length);
        }

        function applyMarkdownFormat(type) {
            // (省略せず保持)
            if (editorPreview.classList.contains('hidden') === false) togglePreviewMode();
            const start = editor.selectionStart; const end = editor.selectionEnd;
            const text = editor.value; const selectedText = text.substring(start, end);
            let newText = ''; let offset = 0;
            switch(type) {
                case 'h2': newText = `## ${selectedText || '章タイトル'}`; offset = selectedText ? newText.length : 3; break;
                case 'bold': newText = `**${selectedText || '太字'}**`; offset = selectedText ? newText.length : 2; break;
                case 'italic': newText = `*${selectedText || '斜体'}*`; offset = selectedText ? newText.length : 1; break;
                case 'list-ul': newText = selectedText ? selectedText.split('\n').map(line => `- ${line}`).join('\n') : '- '; offset = newText.length; break;
                case 'list-ol': newText = selectedText ? selectedText.split('\n').map((line,i) => `${i+1}. ${line}`).join('\n') : '1. '; offset = newText.length; break;
                case 'quote': newText = selectedText ? selectedText.split('\n').map(line => `> ${line}`).join('\n') : '> '; offset = newText.length; break;
                case 'code': newText = (selectedText.includes('\n') || !selectedText) ? `\`\`\`\n${selectedText || 'コード'}\n\`\`\`` : `\`${selectedText}\``; offset = selectedText ? newText.length : (newText.length-4); break;
                case 'link': newText = `[${selectedText || 'リンク'}](URL)`; offset = selectedText ? newText.length - 1 : 1; break;
            }
            editor.value = text.substring(0, start) + newText + text.substring(end);
            editor.dispatchEvent(new Event('input')); editor.focus();
            if (selectedText) editor.setSelectionRange(start, start + newText.length);
            else editor.setSelectionRange(start + offset, start + offset);
        }

        function updateTOC() {
            const lines = editor.value.split('\n');
            const headings = lines.map((line, index) => ({ match: line.match(/^(#{1,6})\s+(.+)$/), index })).filter(x => x.match);
            
            if (headings.length === 0) {
                tocList.innerHTML = '<li class="text-slate-500 italic text-sm">見出し(#)で目次生成</li>'; return;
            }
            tocList.innerHTML = '';
            headings.forEach(h => {
                const li = document.createElement('li');
                const level = h.match[1].length;
                li.className = `cursor-pointer hover:text-primary transition truncate`;
                li.style.paddingLeft = `${(level - 1) * 12}px`; li.style.fontSize = level === 1 ? '0.95rem' : '0.85rem';
                li.innerHTML = `<i class="fa-solid fa-chevron-right text-[10px] text-slate-300 mr-1"></i> ${h.match[2]}`;
                li.addEventListener('click', () => {
                    if (!editorPreview.classList.contains('hidden')) togglePreviewMode();
                    let charCount = 0; for(let i=0; i<h.index; i++) charCount += lines[i].length + 1;
                    editor.focus(); editor.setSelectionRange(charCount, charCount);
                    editor.scrollTop = h.index * parseInt(window.getComputedStyle(editor).lineHeight);
                });
                tocList.appendChild(li);
            });
        }

        // ==========================================
        // AI 処理群 (Action, Chat, Draft)
        // ==========================================
        function getAPIKey(model) {
            const key = model === 'claude' ? appSettings.claudeKey : appSettings.geminiKey;
            if (!key) {
                showToast(`${model}のAPIキーが設定されていません`, 'error');
                document.getElementById('btn-settings').click();
                return null;
            }
            return key;
        }

        function getPersonaPrompt(id) {
            const p = appSettings.personas.find(x => x.id === id);
            return p ? p.prompt : '';
        }

        async function executeAITask(prompt, actionName, mode, model = null, sysPrompt = null) {
            const aiModel = model || appSettings.defaultModel;
            const apiKey = getAPIKey(aiModel);
            if (!apiKey) return;

            const systemPrompt = sysPrompt || getPersonaPrompt('default');
            const taskData = { aiModel, apiKey, prompt, systemPrompt, actionName, mode };

            await dbSettings.setItem('pendingAI', taskData); // レジューム用
            setAIProcessingState(true);
            await requestWakeLock();
            
            // 処理開始時は2秒で消えるinfo通知
            showToast(`${actionName}を実行中...`, 'info');

            try {
                const data = await runAIWorker(taskData);
                await dbSettings.removeItem('pendingAI');
                
                if (mode === 'replace') {
                    const before = editor.value.substring(0, selectionRange.start);
                    const after = editor.value.substring(selectionRange.end);
                    editor.value = before + data.resultText + after;
                    editor.dispatchEvent(new Event('input'));
                    showToast(`${actionName}を適用しました`, 'aiComplete');
                } else if (mode === 'draft') {
                    draftContentCache = data.resultText;
                    document.getElementById('draft-preview').innerHTML = marked.parse(draftContentCache);
                    showToast('記事ドラフトを生成しました', 'aiComplete');
                } else if (mode === 'chat') {
                    const aiMsg = { id: Date.now().toString(), docId: currentDocId, timestamp: new Date().toISOString(), role: 'ai', content: data.resultText };
                    await dbChat.setItem(aiMsg.id, aiMsg);
                    await loadChatHistory();
                    showToast('回答を受信しました', 'aiComplete');
                }
            } catch (err) {
                console.error(err);
                showToast(`エラー: ${err.message}`, 'error');
            } finally {
                setAIProcessingState(false);
                await releaseWakeLock();
            }
        }

        async function handleAIAction(action) {
            hideActionSheet();
            if (!selectionRange.text) return;
            if (action === 'research') { document.getElementById('research-modal').classList.remove('hidden'); return; }

            let prompt = "";
            if (action === 'elaborate') {
                const startExtract = Math.max(0, selectionRange.start - 150);
                const endExtract = Math.min(editor.value.length, selectionRange.end + 150);
                const context = editor.value.substring(startExtract, endExtract);
                prompt = `以下の選択されたテキストを、その前後の文脈との整合性を保ちつつ、より詳細かつ魅力的に加筆・拡張してください。生成結果のテキストのみを出力してください。\n\n【前後の文脈】\n${context}\n\n【対象テキスト】\n${selectionRange.text}`;
            } else {
                const prompts = {
                    clean: `以下の文章の誤字脱字を修正し、冗長な表現を省いてきれいに整えて。結果のみ出力。\n\n${selectionRange.text}`,
                    summarize: `以下の文章を簡潔に要約して。重要なポイントが伝わるように。結果のみ出力。\n\n${selectionRange.text}`,
                    refine: `以下の文章の表現をより専門的かつ魅力的にブラッシュアップして。結果のみ出力。\n\n${selectionRange.text}`,
                    structure: `以下の文章を内容に応じて適切なマークダウンを用いて構造化して。結果のみ出力。\n\n${selectionRange.text}`
                };
                prompt = prompts[action];
            }
            const names = { elaborate: '詳細化', clean: 'きれい化', summarize: '要約', refine: '表現修整', structure: '構造化' };
            await saveVersion('ai', `AI前 (${names[action]})`);
            await executeAITask(prompt, names[action], 'replace');
        }

        async function executeResearch() {
            const instruction = document.getElementById('research-prompt').value.trim();
            document.getElementById('research-modal').classList.add('hidden');
            const prompt = `以下の文章と調査方針に基づいて、深掘り調査を行い、詳細なレポート（マークダウン形式）を作成してください。\n\n【対象文章】\n${selectionRange.text}\n\n【調査方針】\n${instruction || '深く掘り下げて解説して'}`;
            
            // Researchは特殊な結果保存なので直接Worker呼出し
            const aiModel = appSettings.defaultModel;
            const apiKey = getAPIKey(aiModel); if(!apiKey) return;
            setAIProcessingState(true); await requestWakeLock(); showToast(`深掘り調査を実行中...`, 'info');
            try {
                const data = await runAIWorker({ aiModel, apiKey, prompt, systemPrompt: getPersonaPrompt('default'), actionName: '深掘り調査', mode: 'research' });
                // 今後ノート保存機能に戻す（今回はDraftタブがあるのでチャットかDraftに統合可能だが、要件通り既存の履歴ノート機能へ）
                insertTextAtCursor(`\n\n> **深掘り調査結果**\n${data.resultText}\n\n`);
                showToast(`調査結果を挿入しました`, 'aiComplete');
            } catch(e) { showToast(`エラー: ${e.message}`, 'error'); } 
            finally { setAIProcessingState(false); await releaseWakeLock(); }
        }

        async function sendChatMessage() {
            const inputEl = document.getElementById('chat-input');
            const text = inputEl.value.trim();
            if (!text || isProcessing) return;
            
            inputEl.value = '';
            const model = document.getElementById('chat-model').value;
            const personaId = document.getElementById('chat-persona').value;
            const sysPrompt = getPersonaPrompt(personaId);
            
            let promptText = text;
            const incDoc = document.getElementById('chat-ctx-doc').checked;
            const incSel = document.getElementById('chat-ctx-sel').checked;
            
            if (incDoc || incSel) {
                promptText = "以下のコンテキストを踏まえて質問に答えてください。\n\n";
                if (incDoc) promptText += `【ドキュメント全体】\n${docTitleInput.value}\n${editor.value}\n\n`;
                if (incSel && selectionRange.text) promptText += `【選択テキスト】\n${selectionRange.text}\n\n`;
                promptText += `【質問】\n${text}`;
            }

            const userMsg = { id: Date.now().toString(), docId: currentDocId, timestamp: new Date().toISOString(), role: 'user', content: text };
            await dbChat.setItem(userMsg.id, userMsg); await loadChatHistory();
            
            await executeAITask(promptText, 'チャット応答', 'chat', model, sysPrompt);
        }

        async function loadChatHistory() {
            const keys = await dbChat.keys();
            const messages = (await Promise.all(keys.map(k => dbChat.getItem(k)))).filter(m => m.docId === currentDocId).sort((a,b)=> new Date(a.timestamp) - new Date(b.timestamp));
            
            const list = document.getElementById('chat-list'); list.innerHTML = '';
            if (messages.length === 0) { list.innerHTML = '<p class="text-[10px] text-slate-400 italic text-center mt-4">履歴なし</p>'; return; }
            
            messages.forEach(msg => {
                const isU = msg.role === 'user';
                const div = document.createElement('div'); div.className = `flex flex-col gap-1 ${isU ? 'items-end' : 'items-start'}`;
                const content = isU ? msg.content.replace(/\n/g, '<br>') : marked.parse(msg.content);
                div.innerHTML = `
                    <span class="text-[9px] text-slate-400 px-1">${isU ? 'あなた' : 'AI'}</span>
                    <div class="${isU ? 'bg-primary text-white' : 'bg-white border border-slate-200 text-slate-700'} p-2 rounded-xl text-xs max-w-[90%] ${!isU ? 'prose prose-sm max-w-none' : ''}">
                        ${content}
                    </div>
                    ${!isU ? `<button class="text-[9px] text-primary mt-1 self-end btn-chat-ins"><i class="fa-solid fa-file-import"></i> 挿入</button>` : ''}
                `;
                if(!isU) div.querySelector('.btn-chat-ins').addEventListener('click', () => { insertTextAtCursor(`\n${msg.content}\n`); showToast('挿入しました', 'success'); });
                list.appendChild(div);
            });
            list.scrollTop = list.scrollHeight;
        }

        async function generateDraft() {
            if(isProcessing) return;
            const model = document.getElementById('draft-model').value;
            const personaId = document.getElementById('draft-persona').value;
            const instruction = document.getElementById('draft-instruction').value.trim();
            const ctxType = document.getElementById('draft-context').value;
            
            if(!instruction) { showToast('生成指示を入力してください', 'warning'); return; }

            let prompt = "以下の指示に基づき、記事（ドキュメント）のドラフトを作成してください。マークダウン形式で出力してください。\n\n";
            prompt += `【生成指示】\n${instruction}\n\n`;
            if (ctxType === 'doc') prompt += `【参考ドキュメント】\n${editor.value}\n\n`;
            if (ctxType === 'sel' && selectionRange.text) prompt += `【参考テキスト】\n${selectionRange.text}\n\n`;

            document.getElementById('draft-preview').innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-primary"></i> 生成中...';
            await executeAITask(prompt, '記事ドラフト生成', 'draft', model, getPersonaPrompt(personaId));
        }

        // ==========================================
        // ドキュメント管理
        // ==========================================
        async function loadDocumentList() {
            let list = await dbDocList.getItem('list') || [];
            if (list.length === 0) {
                const initDoc = { id: 'doc_' + Date.now(), title: '無題', updatedAt: Date.now() };
                list.push(initDoc); await dbDocList.setItem('list', list); currentDocId = initDoc.id;
            } else if (!currentDocId || !list.find(d => d.id === currentDocId)) currentDocId = list[0].id;
            renderDocList(list); await loadDocument();
        }

        async function createNewDocument() {
            await saveDocument();
            let list = await dbDocList.getItem('list') || [];
            const newId = 'doc_' + Date.now();
            list.push({ id: newId, title: '無題', updatedAt: Date.now() });
            await dbDocList.setItem('list', list);
            currentDocId = newId; editor.value = ''; currentContent = ''; docTitleInput.value = '';
            renderDocList(list); await saveDocument(); await saveVersion('init', '作成');
            if (!editorPreview.classList.contains('hidden')) togglePreviewMode(); 
            updateTOC(); await loadHistory(); await loadChatHistory();
            if (window.innerWidth <= 768) document.getElementById('btn-close-left-sidebar').click();
        }

        function renderDocList(list) {
            docListEl.innerHTML = ''; list.sort((a, b) => b.updatedAt - a.updatedAt);
            list.forEach(doc => {
                const div = document.createElement('div');
                const isAct = doc.id === currentDocId;
                div.className = `p-2 rounded cursor-pointer text-xs sm:text-sm flex justify-between items-center transition ${isAct ? 'bg-primary/10 text-primary font-bold' : 'text-slate-600 hover:bg-slate-100'}`;
                div.innerHTML = `<div class="truncate flex-1 btn-sw pr-2"><i class="fa-regular fa-file-lines mr-2 ${isAct?'text-primary':'text-slate-400'}"></i>${doc.title}</div>`;
                div.querySelector('.btn-sw').addEventListener('click', async () => {
                    if (currentDocId !== doc.id) { await saveDocument(); currentDocId = doc.id; renderDocList(await dbDocList.getItem('list')); await loadDocument(); if (window.innerWidth <= 768) document.getElementById('btn-close-left-sidebar').click(); }
                });
                docListEl.appendChild(div);
            });
        }

        async function loadDocument() {
            if (!currentDocId) return;
            const list = await dbDocList.getItem('list') || [];
            const meta = list.find(d => d.id === currentDocId);
            if (meta) docTitleInput.value = meta.title === '無題' ? '' : meta.title;
            const doc = await dbDoc.getItem(currentDocId);
            editor.value = doc ? doc.content : ''; currentContent = editor.value;
            updateSaveStatus("保存済", "text-slate-400", "fa-cloud-check");
            updateTOC(); await loadHistory(); await loadChatHistory();
        }

        async function saveDocument() {
            if (!currentDocId || isProcessing) return; // 処理中は状態保護のためスキップ
            const content = editor.value; const title = docTitleInput.value.trim() || '無題';
            await dbDoc.setItem(currentDocId, { id: currentDocId, content, lastModified: new Date().toISOString() });
            let list = await dbDocList.getItem('list') || [];
            const meta = list.find(d => d.id === currentDocId);
            if (meta) { meta.title = title; meta.updatedAt = Date.now(); await dbDocList.setItem('list', list); renderDocList(list); }
            updateSaveStatus("保存済", "text-slate-400", "fa-cloud-check");
        }

        function updateSaveStatus(text, colorClass, iconClass) {
            if(isProcessing) return; // 処理中はステータスを上書きしない
            saveStatus.className = `text-[10px] sm:text-xs whitespace-nowrap ${colorClass}`;
            saveStatus.innerHTML = `<i class="fa-solid ${iconClass}"></i> ${text}`;
        }

        async function saveVersion(reason, desc) {
            if (!currentDocId) return;
            const title = docTitleInput.value.trim();
            const savedContent = title ? `# ${title}\n\n${editor.value}` : editor.value;
            const ver = { id: Date.now().toString(), docId: currentDocId, timestamp: new Date().toISOString(), content: savedContent, reason, description: desc };
            await dbHistory.setItem(ver.id, ver);
            
            const keys = await dbHistory.keys();
            let versions = (await Promise.all(keys.map(k => dbHistory.getItem(k)))).filter(v => v.docId === currentDocId).sort((a,b)=> new Date(b.timestamp)-new Date(a.timestamp));
            if (versions.length > 5) {
                for(let v of versions.slice(5)) await dbHistory.removeItem(v.id);
            }
            await loadHistory();
        }

        async function loadHistory() {
            const keys = await dbHistory.keys();
            const versions = (await Promise.all(keys.map(k => dbHistory.getItem(k)))).filter(v => v.docId === currentDocId).sort((a,b)=> new Date(b.timestamp)-new Date(a.timestamp));
            historyList.innerHTML = '';
            versions.forEach(v => {
                const date = new Date(v.timestamp); const tStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                let col = v.reason==='ai'?'text-indigo-500':v.reason==='manual'?'text-green-500':'text-blue-500';
                const div = document.createElement('div'); div.className = 'bg-white p-2 border border-slate-100 rounded text-xs group';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1"><span class="font-bold text-slate-600"><i class="fa-solid fa-clock ${col} mr-1"></i>${v.description}</span><span class="text-[9px] text-slate-400">${tStr}</span></div>
                    <div class="text-[10px] text-slate-500 truncate mb-1">${v.content.substring(0,30)}</div>
                    <button class="w-full py-1 bg-slate-100 hover:bg-slate-200 rounded hidden group-hover:block btn-rest"><i class="fa-solid fa-rotate-left"></i> 復元</button>
                `;
                div.querySelector('.btn-rest').addEventListener('click', async () => {
                    if(confirm('復元しますか？')) {
                        let txt = v.content;
                        if(txt.startsWith('# ')) { const idx=txt.indexOf('\n'); if(idx!==-1){ docTitleInput.value=txt.substring(2,idx).trim(); txt=txt.substring(idx).trimStart(); } }
                        editor.value = txt; currentContent = txt; await saveDocument(); updateTOC(); showToast('復元しました','success');
                    }
                });
                historyList.appendChild(div);
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
