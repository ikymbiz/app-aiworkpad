<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIWorkPad</title>
    <!-- Tailwind CSS with Typography Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- LocalForage (IndexedDB Wrapper) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <!-- Marked.js (Markdown Parser) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        dark: '#0f172a',
                        light: '#f8fafc'
                    }
                }
            }
        }
    </script>
    <style>
        /* カスタムスクロールバー */
        .custom-scrollbar::-webkit-scrollbar,
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track,
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb,
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover,
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        /* エディタのスタイル調整 */
        #editor {
            line-height: 1.8;
            font-size: 16px;
        }

        /* 左サイドバー(ドキュメント一覧)のアニメーション */
        #left-sidebar {
            transition: margin-left 0.3s ease, transform 0.3s ease;
        }
        @media (max-width: 768px) {
            #left-sidebar {
                transform: translateX(-100%);
                margin-left: 0 !important;
            }
            #left-sidebar.open-mobile {
                transform: translateX(0);
            }
        }
        @media (min-width: 769px) {
            #left-sidebar {
                transform: translateX(0) !important;
            }
            #left-sidebar.closed-pc {
                margin-left: -16rem;
            }
        }

        /* 右サイドパネルのアニメーション (モバイル用) */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                top: 0;
                right: -100%;
                width: 85%;
                height: 100vh;
                z-index: 50;
                transition: right 0.3s ease-in-out;
            }
            #sidebar.open {
                right: 0;
            }
            #sidebar-overlay {
                display: none;
            }
            #sidebar-overlay.open {
                display: block;
            }
        }

        /* トースト通知のアニメーション */
        .toast-enter {
            animation: slideInRight 0.3s ease-out forwards;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-light text-slate-800 h-screen overflow-hidden flex flex-col font-sans">

    <!-- ヘッダー -->
    <header class="bg-white border-b border-slate-200 shadow-sm px-4 py-3 flex justify-between items-center z-40 shrink-0">
        <div class="flex items-center gap-2">
            <button id="btn-toggle-left-sidebar" class="text-slate-500 hover:text-primary transition p-2 rounded-full hover:bg-slate-100" title="ドキュメント一覧">
                <i class="fa-solid fa-folder-tree"></i>
            </button>
            <i class="fa-solid fa-pen-nib text-primary text-xl hidden sm:block"></i>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-indigo-500 hidden sm:block">AIWorkPad</h1>
            <span id="save-status" class="text-xs text-slate-400 ml-2"><i class="fa-solid fa-cloud"></i> 保存済</span>
        </div>
        <div class="flex items-center gap-3">
            <button id="btn-manual-save" class="text-slate-500 hover:text-primary transition p-2 rounded-full hover:bg-slate-100" title="手動保存">
                <i class="fa-solid fa-save"></i>
            </button>
            <button id="btn-settings" class="text-slate-500 hover:text-primary transition p-2 rounded-full hover:bg-slate-100" title="設定">
                <i class="fa-solid fa-gear"></i>
            </button>
            <button id="btn-toggle-sidebar" class="text-slate-500 hover:text-primary transition p-2 rounded-full hover:bg-slate-100 md:hidden" title="ツールパネル">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </button>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <div class="flex-1 flex overflow-hidden relative">
        
        <!-- 左サイドバーオーバーレイ (モバイル用) -->
        <div id="left-sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

        <!-- 左サイドバー (ドキュメント一覧) -->
        <aside id="left-sidebar" class="w-64 bg-slate-50 border-r border-slate-200 flex flex-col shrink-0 absolute md:relative h-full z-50">
            <div class="p-3 border-b border-slate-200 flex justify-between items-center bg-white">
                <span class="font-bold text-slate-700 text-sm"><i class="fa-solid fa-file-lines mr-1 text-primary"></i> ドキュメント</span>
                <button id="btn-new-doc" class="text-slate-400 hover:text-primary transition p-1" title="新規ドキュメント作成">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
            <div id="doc-list" class="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                <!-- ドキュメントリストがJavaScriptで生成されます -->
            </div>
            <!-- モバイル用 左パネル閉じるボタン -->
            <button id="btn-close-left-sidebar" class="md:hidden p-3 bg-slate-200 text-center font-bold text-slate-600 text-sm border-t border-slate-300">
                閉じる
            </button>
        </aside>

        <!-- エディタエリア -->
        <main class="flex-1 flex flex-col relative bg-white h-full overflow-hidden">
            
            <!-- タイトル入力セクション -->
            <div class="shrink-0 px-4 md:px-8 pt-4 pb-2 border-b border-slate-100 flex items-center gap-2">
                <input type="text" id="doc-title-input" class="w-full text-xl md:text-2xl font-bold text-slate-800 placeholder-slate-300 border-none focus:outline-none focus:ring-0 bg-transparent" placeholder="無題のドキュメント">
            </div>

            <!-- Markdown入力支援ツールバー -->
            <div class="shrink-0 px-4 md:px-8 py-2 bg-slate-50/50 border-b border-slate-200 flex items-center gap-1 overflow-x-auto custom-scrollbar">
                <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1.5 md:p-2 rounded transition flex-shrink-0" data-md="h2" title="章タイトル (H2)"><i class="fa-solid fa-heading"></i></button>
                <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1.5 md:p-2 rounded transition flex-shrink-0" data-md="bold" title="太字"><i class="fa-solid fa-bold"></i></button>
                <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1.5 md:p-2 rounded transition flex-shrink-0" data-md="italic" title="斜体"><i class="fa-solid fa-italic"></i></button>
                <div class="w-px h-5 bg-slate-300 mx-1 flex-shrink-0"></div>
                <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1.5 md:p-2 rounded transition flex-shrink-0" data-md="list-ul" title="箇条書き"><i class="fa-solid fa-list-ul"></i></button>
                
                <div class="flex items-center flex-shrink-0">
                    <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1.5 md:p-2 rounded-l transition" data-md="list-ol" title="番号付きリスト"><i class="fa-solid fa-list-ol"></i></button>
                    <select id="ol-type-select" class="bg-slate-100 text-slate-500 text-xs focus:outline-none p-1.5 border-l border-slate-200 rounded-r cursor-pointer hover:bg-slate-200 transition" title="項番の種類">
                        <option value="1">1.</option>
                        <option value="A">A.</option>
                        <option value="a">a.</option>
                        <option value="I">I.</option>
                        <option value="i">i.</option>
                    </select>
                </div>

                <div class="w-px h-5 bg-slate-300 mx-1 flex-shrink-0"></div>
                <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1.5 md:p-2 rounded transition flex-shrink-0" data-md="quote" title="引用"><i class="fa-solid fa-quote-right"></i></button>
                <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1.5 md:p-2 rounded transition flex-shrink-0" data-md="code" title="コード"><i class="fa-solid fa-code"></i></button>
                <button class="toolbar-btn text-slate-500 hover:text-primary hover:bg-slate-200 p-1.5 md:p-2 rounded transition flex-shrink-0" data-md="link" title="リンク"><i class="fa-solid fa-link"></i></button>

                    <i class="fa-solid fa-eye"></i> プレビュー

            </div>

            <!-- エディタ & プレビュー コンテナ -->
            <div class="flex-1 relative overflow-hidden bg-white">
                <!-- 編集モード -->
                <textarea id="editor" class="absolute inset-0 w-full h-full p-4 md:p-8 bg-transparent custom-scrollbar resize-none focus:outline-none" placeholder="Write here... &#10;テキストを選択するとAIメニューが表示されます。"></textarea>
                
                <!-- プレビューモード (WYSIWYGライク) -->
                <div id="editor-preview" class="hidden absolute inset-0 p-4 md:p-8 overflow-y-auto custom-scrollbar prose prose-sm md:prose-base prose-slate max-w-none bg-white z-10 pb-20"></div>

                <!-- AIアクションシート (モダンなフローティングメニュー) -->

                    <div class="flex items-center justify-between mb-1 px-1 border-b border-slate-100 pb-1">

                        <button id="btn-close-actions" class="text-slate-300 hover:text-slate-500 p-1"><i class="fa-solid fa-times text-xs"></i></button>
                    </div>
                    <div class="flex gap-1">

                            <i class="fa-solid fa-broom text-sm mb-1"></i><span class="text-[9px] font-medium whitespace-nowrap">きれい化</span>
                        </button>
                        <button class="ai-action-btn flex flex-col items-center p-2 rounded hover:bg-blue-50 text-primary transition min-w-[50px]" data-action="summarize">
                            <i class="fa-solid fa-compress text-sm mb-1"></i><span class="text-[9px] font-medium whitespace-nowrap">要約</span>
                        </button>
                        <button class="ai-action-btn flex flex-col items-center p-2 rounded hover:bg-blue-50 text-primary transition min-w-[50px]" data-action="refine">
                            <i class="fa-solid fa-wand-magic-sparkles text-sm mb-1"></i><span class="text-[9px] font-medium whitespace-nowrap">表現修整</span>
                        </button>
                        <button class="ai-action-btn flex flex-col items-center p-2 rounded hover:bg-blue-50 text-primary transition min-w-[50px]" data-action="structure">
                            <i class="fa-solid fa-list-ul text-sm mb-1"></i><span class="text-[9px] font-medium whitespace-nowrap">構造化</span>
                        </button>
                        <div class="w-px bg-slate-200 mx-1"></div>
                        <button class="ai-action-btn flex flex-col items-center p-2 rounded hover:bg-blue-50 text-primary transition min-w-[50px]" data-action="research">
                            <i class="fa-solid fa-magnifying-glass text-sm mb-1"></i><span class="text-[9px] font-medium whitespace-nowrap">深掘調査</span>

                    </div>
                </div>
            </div>
        </main>

        <!-- モバイル用 右サイドパネルオーバーレイ -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40"></div>

        <!-- 右サイドパネル (AIチャット・目次・調査・履歴) -->
        <aside id="sidebar" class="w-80 bg-slate-50 border-l border-slate-200 flex flex-col shrink-0 shadow-xl md:shadow-none md:static md:right-auto md:h-auto">
            <!-- タブナビゲーション -->
            <div class="flex border-b border-slate-200 bg-white">
                <button class="tab-btn flex flex-col items-center justify-center flex-1 py-2 text-[10px] sm:text-xs font-medium text-primary border-b-2 border-primary gap-1" data-target="tab-chat">
                    <i class="fa-solid fa-comments text-sm sm:mr-1"></i>チャット
                </button>
                <button class="tab-btn flex flex-col items-center justify-center flex-1 py-2 text-[10px] sm:text-xs font-medium text-slate-500 hover:text-slate-700 gap-1" data-target="tab-toc">
                    <i class="fa-solid fa-list text-sm sm:mr-1"></i>目次
                </button>
                <button class="tab-btn flex flex-col items-center justify-center flex-1 py-2 text-[10px] sm:text-xs font-medium text-slate-500 hover:text-slate-700 gap-1" data-target="tab-research">
                    <i class="fa-solid fa-book-open text-sm sm:mr-1"></i>調査
                </button>
                <button class="tab-btn flex flex-col items-center justify-center flex-1 py-2 text-[10px] sm:text-xs font-medium text-slate-500 hover:text-slate-700 gap-1" data-target="tab-history">
                    <i class="fa-solid fa-clock-rotate-left text-sm sm:mr-1"></i>履歴
                </button>
            </div>

            <!-- タブコンテンツ -->
            <div class="flex-1 overflow-y-auto p-4 flex flex-col custom-scrollbar">
                
                <!-- AIチャットタブ -->
                <div id="tab-chat" class="tab-content active h-full flex flex-col">
                    <div class="flex justify-between items-center mb-2 px-1">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">AIアシスタント</h3>
                        <button id="btn-clear-chat" class="text-xs text-red-400 hover:text-red-600" title="チャット履歴をクリア"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <div id="chat-list" class="flex-1 overflow-y-auto space-y-3 pb-2 custom-scrollbar">
                        <p class="text-sm text-slate-500 italic">AIに質問や指示を出せます</p>
                    </div>
                    <div class="mt-2 pt-2 border-t border-slate-200 shrink-0">
                        <div class="flex flex-wrap gap-2 mb-2 text-[10px] text-slate-500 font-medium">
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="chat-ctx-doc" class="rounded text-primary">ドキュメント全体を含める</label>
                            <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="chat-ctx-sel" class="rounded text-primary">選択中テキストを含める</label>
                        </div>
                        <div class="flex gap-2">
                            <textarea id="chat-input" class="flex-1 bg-white border border-slate-300 rounded-lg p-2 text-sm resize-none focus:outline-none focus:ring-1 focus:ring-primary shadow-inner" rows="2" placeholder="メッセージを入力..."></textarea>
                            <button id="btn-send-chat" class="bg-primary text-white px-3 rounded-lg hover:bg-blue-600 transition flex items-center justify-center shadow-md"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>

                <!-- 目次タブ -->
                <div id="tab-toc" class="tab-content hidden">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">ドキュメント構造</h3>
                    <ul id="toc-list" class="space-y-1 text-sm">
                        <li class="text-slate-500 italic">見出し(#)を追加すると目次が生成されます</li>
                    </ul>
                </div>

                <!-- 調査タブ -->
                <div id="tab-research" class="tab-content hidden">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">調査ノート</h3>
                        <button id="btn-clear-research" class="text-xs text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i> クリア</button>
                    </div>
                    <div id="research-list" class="space-y-4">
                        <p class="text-sm text-slate-500 italic">「深掘り調査」の結果がここに保存されます。</p>
                    </div>
                </div>

                <!-- 履歴タブ -->
                <div id="tab-history" class="tab-content hidden">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">バージョン履歴</h3>
                    <div id="history-list" class="space-y-2">

                    </div>
                </div>

            <!-- モバイル用 サイドパネル閉じるボタン -->
            <button id="btn-close-sidebar-mobile" class="md:hidden p-4 bg-slate-200 text-center font-bold text-slate-600 shrink-0 border-t border-slate-300">

    <!-- 深掘り調査モーダル -->
    <div id="research-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-700"><i class="fa-solid fa-magnifying-glass text-primary mr-2"></i>深掘り調査の設定</h3>
                <button id="btn-close-modal" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-times text-lg"></i></button>
            </div>
            <div class="p-4 flex-1">
                <p class="text-sm text-slate-600 mb-2">選択したテキストを元に調査を行います。調査の方針や追加の指示を入力してください。</p>
                <textarea id="research-prompt" class="w-full h-32 p-3 border border-slate-300 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm custom-scrollbar" placeholder="例：最新の統計データを含めて解説して。反対意見の観点からも考察して。"></textarea>
            </div>
            <div class="p-4 border-t border-slate-100 flex justify-end gap-2 bg-slate-50">
                <button id="btn-cancel-research" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-200 rounded-lg transition">キャンセル</button>
                <button id="btn-execute-research" class="px-4 py-2 text-sm font-medium bg-primary text-white hover:bg-blue-600 rounded-lg transition shadow-md flex items-center gap-2">
                    <i class="fa-solid fa-paper-plane"></i> 調査開始
                </button>
            </div>
        </div>
    </div>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-700"><i class="fa-solid fa-gear text-primary mr-2"></i>設定</h3>
                <button id="btn-close-settings" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-times text-lg"></i></button>
            </div>
            <div class="p-4 flex-1">
                <label class="block text-sm font-medium text-slate-700 mb-1">Gemini APIキー</label>
                <input type="password" id="input-api-key" class="w-full p-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm" placeholder="AIzaSy...">
                <p class="text-xs text-slate-500 mt-2">APIキーはブラウザのローカルストレージにのみ保存され、直接Gemini APIへのリクエストに利用されます。</p>
            </div>
            <div class="p-4 border-t border-slate-100 flex justify-end gap-2 bg-slate-50">
                <button id="btn-save-settings" class="px-4 py-2 text-sm font-medium bg-primary text-white hover:bg-blue-600 rounded-lg transition shadow-md">保存</button>
            </div>
        </div>
    </div>

    <!-- トースト通知コンテナ -->
    <div id="toast-container" class="fixed top-4 right-4 z-[60] flex flex-col gap-2 w-72 pointer-events-none"></div>

    <script>
        // ==========================================
        // 定数・初期設定・ヘルパー
        // ==========================================
        const SAVE_INTERVAL = 5 * 60 * 1000;
        
        // ローマ数字変換ヘルパー
        function intToRoman(num) {
            if (isNaN(num)) return '';
            const map = { M: 1000, CM: 900, D: 500, CD: 400, C: 100, XC: 90, L: 50, XL: 40, X: 10, IX: 9, V: 5, IV: 4, I: 1 };
            let result = '';
            for (let key in map) {
                while (num >= map[key]) {
                    result += key;
                    num -= map[key];
                }
            }
            return result;
        }

        function romanToInt(s) {
            const map = { I: 1, V: 5, X: 10, L: 50, C: 100, D: 500, M: 1000 };
            let total = 0;
            for (let i = 0; i < s.length; i++) {
                let current = map[s[i]];
                let next = map[s[i + 1]];
                if (next && current < next) {
                    total -= current;
                } else {
                    total += current;
                }
            }
            return total;
        }

        // DOM Elements
        const docTitleInput = document.getElementById('doc-title-input');
        const editor = document.getElementById('editor');
        const editorPreview = document.getElementById('editor-preview');
        const btnTogglePreview = document.getElementById('btn-toggle-preview');
        const aiActionSheet = document.getElementById('ai-action-sheet');
        const saveStatus = document.getElementById('save-status');
        const btnManualSave = document.getElementById('btn-manual-save');
        const tocList = document.getElementById('toc-list');
        const historyList = document.getElementById('history-list');
        const researchList = document.getElementById('research-list');
        const docListEl = document.getElementById('doc-list');
        const olTypeSelect = document.getElementById('ol-type-select');
        
        // State
        let currentDocId = null;
        let currentContent = "";
        let selectionRange = { start: 0, end: 0, text: "" };
        let isProcessing = false;
        let typingTimer;
        
        // DB Stores (localForage)
        const dbDocList = localforage.createInstance({ name: "AIWorkPad", storeName: "docList" });
        const dbDoc = localforage.createInstance({ name: "AIWorkPad", storeName: "document" });
        const dbHistory = localforage.createInstance({ name: "AIWorkPad", storeName: "history" });
        const dbResearch = localforage.createInstance({ name: "AIWorkPad", storeName: "research" });
        const dbChat = localforage.createInstance({ name: "AIWorkPad", storeName: "chat" });

        // ==========================================
        // 初期化処理
        // ==========================================
        async function init() {
            setupEventListeners();
            await loadDocumentList();
            
            setInterval(() => {

        // ==========================================
        // イベントリスナーの設定
        // ==========================================
        function setupEventListeners() {
            // タイトル入力の監視
            docTitleInput.addEventListener('input', () => {
                updateSaveStatus("未保存", "text-amber-500", "fa-pen");
                clearTimeout(typingTimer);
                typingTimer = setTimeout(async () => {
                    await saveDocument();
                }, 1000);
            });

            // エディタの入力監視
            editor.addEventListener('input', () => {
                currentContent = editor.value;
                updateSaveStatus("未保存", "text-amber-500", "fa-pen");
                
                clearTimeout(typingTimer);
                typingTimer = setTimeout(async () => {
                    await saveDocument();
                    updateTOC();
                }, 1000);
            });

            // エディタのEnterキーによる自動連番 (項番の増分)
            editor.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const cursor = editor.selectionStart;
                    const textBeforeCursor = editor.value.substring(0, cursor);
                    const textAfterCursor = editor.value.substring(cursor);
                    
                    const lines = textBeforeCursor.split('\n');
                    const currentLine = lines[lines.length - 1];
                    
                    const matchUl = currentLine.match(/^(\s*)([-*+])\s+(.*)$/);
                    const matchOl = currentLine.match(/^(\s*)([0-9]+|[A-Z]|[a-z]|[IVXLCDM]+|[ivxlcdm]+)\.\s+(.*)$/);

                    if (matchUl || matchOl) {
                        e.preventDefault();
                        
                        if ((matchUl && !matchUl[3]) || (matchOl && !matchOl[3])) {
                            // 空のリスト項目でEnterを押した場合はリスト終了
                            const newTextBefore = textBeforeCursor.substring(0, textBeforeCursor.length - currentLine.length);
                            editor.value = newTextBefore + '\n' + textAfterCursor;
                            editor.selectionStart = editor.selectionEnd = newTextBefore.length + 1;
                            editor.dispatchEvent(new Event('input'));
                            return;
                        }

                        let nextPrefix = '\n';
                        
                        if (matchUl) {
                            nextPrefix += `${matchUl[1]}${matchUl[2]} `;
                        } else if (matchOl) {
                            const spaces = matchOl[1];
                            const numStr = matchOl[2];
                            let nextNumStr = '';
                            
                            const currentOlType = olTypeSelect.value;
                            
                            if (/^[0-9]+$/.test(numStr)) {
                                nextNumStr = (parseInt(numStr, 10) + 1).toString();
                            } else if (currentOlType === 'I' && /^[IVXLCDM]+$/.test(numStr)) {
                                nextNumStr = intToRoman(romanToInt(numStr) + 1);
                            } else if (currentOlType === 'i' && /^[ivxlcdm]+$/.test(numStr)) {
                                nextNumStr = intToRoman(romanToInt(numStr.toUpperCase()) + 1).toLowerCase();
                            } else if (/^[A-Z]$/.test(numStr)) {
                                nextNumStr = String.fromCharCode(numStr.charCodeAt(0) + 1);
                            } else if (/^[a-z]$/.test(numStr)) {
                                nextNumStr = String.fromCharCode(numStr.charCodeAt(0) + 1);
                            } else if (/^[IVXLCDM]+$/.test(numStr)) {
                                nextNumStr = intToRoman(romanToInt(numStr) + 1);
                            } else if (/^[ivxlcdm]+$/.test(numStr)) {
                                nextNumStr = intToRoman(romanToInt(numStr.toUpperCase()) + 1).toLowerCase();
                            } else {
                                nextNumStr = '1';
                            }
                            
                            nextPrefix += `${spaces}${nextNumStr}. `;
                        }

                        editor.value = textBeforeCursor + nextPrefix + textAfterCursor;
                        editor.selectionStart = editor.selectionEnd = cursor + nextPrefix.length;
                        editor.dispatchEvent(new Event('input'));
                        
                        // 自動スクロール
                        const lineHeight = parseInt(window.getComputedStyle(editor).lineHeight);
                        editor.scrollTop = (lines.length) * lineHeight;
                    }
                }
            });

            // Markdown入力支援ツールバー
            document.querySelectorAll('.toolbar-btn').forEach(btn => {
                btn.addEventListener('mousedown', e => e.preventDefault()); // フォーカスを奪わない
                btn.addEventListener('click', (e) => {
                    const type = e.currentTarget.dataset.md;
                    applyMarkdownFormat(type);

            // プレビュー切り替え

            // テキスト選択の監視

            // アクションシートのボタン
            document.getElementById('btn-close-actions').addEventListener('mousedown', e => e.preventDefault());
            document.getElementById('btn-close-actions').addEventListener('click', hideActionSheet);
            
            document.querySelectorAll('.ai-action-btn').forEach(btn => {
                btn.addEventListener('mousedown', e => e.preventDefault());
                btn.addEventListener('click', (e) => {

            // 左サイドバー
            const toggleLeftSidebar = () => {

            document.getElementById('btn-toggle-left-sidebar').addEventListener('click', toggleLeftSidebar);
            document.getElementById('btn-close-left-sidebar').addEventListener('click', toggleLeftSidebar);

            // 新規ドキュメント作成

            document.getElementById('btn-toggle-sidebar').addEventListener('click', toggleRightSidebar);
            document.getElementById('btn-close-sidebar-mobile').addEventListener('click', toggleRightSidebar);

            // タブ切り替え
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {

                document.getElementById('input-api-key').value = localStorage.getItem('geminiApiKey') || '';

            });
            document.getElementById('btn-close-settings').addEventListener('click', () => {

            });
            document.getElementById('btn-save-settings').addEventListener('click', () => {
                const key = document.getElementById('input-api-key').value.trim();

            // 調査モーダル
            document.getElementById('btn-close-modal').addEventListener('click', hideResearchModal);
            document.getElementById('btn-cancel-research').addEventListener('click', hideResearchModal);
            document.getElementById('btn-execute-research').addEventListener('click', executeResearch);

            // 調査ノートクリア
            document.getElementById('btn-clear-research').addEventListener('click', async () => {
                if(confirm('このドキュメントの調査ノートをすべて削除しますか？')) {

            // チャット関連

                }

            document.getElementById('btn-clear-chat').addEventListener('click', async () => {
                if(confirm('チャット履歴をクリアしますか？')) {
                    const keys = await dbChat.keys();
                    for(let k of keys) {
                        const item = await dbChat.getItem(k);
                        if(item.docId === currentDocId) await dbChat.removeItem(k);

        // ==========================================
        // エディタ・Markdown連携ロジック
        // ==========================================
        function togglePreviewMode() {
            const isPreview = !editorPreview.classList.contains('hidden');
            if (isPreview) {
                // 編集モードに戻る
                editorPreview.classList.add('hidden');
                editor.classList.remove('hidden');
                btnTogglePreview.innerHTML = '<i class="fa-solid fa-eye"></i> プレビュー';
                btnTogglePreview.classList.remove('bg-primary/10', 'text-primary');
                editor.focus();
            } else {
                // プレビューモードにする (WYSIWYGライク)
                editor.classList.add('hidden');
                editorPreview.classList.remove('hidden');
                btnTogglePreview.innerHTML = '<i class="fa-solid fa-pen"></i> 編集に戻る';
                btnTogglePreview.classList.add('bg-primary/10', 'text-primary');
                
                // タイトルも含めてプレビューする
                const titleMarkdown = docTitleInput.value.trim() ? `# ${docTitleInput.value.trim()}\n\n` : '';
                editorPreview.innerHTML = marked.parse(titleMarkdown + (editor.value || '*何も書かれていません*'));
                hideActionSheet(); // プレビュー中はAIメニューを隠す
            }
        }

        function applyMarkdownFormat(type) {
            if (editorPreview.classList.contains('hidden') === false) {
                togglePreviewMode(); // プレビュー中なら編集モードに戻す
            }

            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            const selectedText = text.substring(start, end);
            let newText = '';
            let cursorOffset = 0;

            switch(type) {
                case 'h2':
                    newText = `## ${selectedText || '章タイトル'}`;
                    cursorOffset = selectedText ? newText.length : 3;
                    break;
                case 'bold':
                    newText = `**${selectedText || '太字'}**`;
                    cursorOffset = selectedText ? newText.length : 2;
                    break;
                case 'italic':
                    newText = `*${selectedText || '斜体'}*`;
                    cursorOffset = selectedText ? newText.length : 1;
                    break;
                case 'list-ul':
                    newText = selectedText ? selectedText.split('\n').map(line => `- ${line}`).join('\n') : '- ';
                    cursorOffset = newText.length;
                    break;
                case 'list-ol':
                    const olType = olTypeSelect.value;
                    let listPrefix = '1. ';
                    if (olType === 'A') listPrefix = 'A. ';
                    else if (olType === 'a') listPrefix = 'a. ';
                    else if (olType === 'I') listPrefix = 'I. ';
                    else if (olType === 'i') listPrefix = 'i. ';

                    if (selectedText) {
                        const lines = selectedText.split('\n');
                        newText = lines.map((line, i) => {
                            let prefix = listPrefix;
                            if (olType === '1') prefix = `${i+1}. `;
                            else if (olType === 'A') prefix = `${String.fromCharCode(65 + i)}. `;
                            else if (olType === 'a') prefix = `${String.fromCharCode(97 + i)}. `;
                            else if (olType === 'I') prefix = `${intToRoman(i+1)}. `;
                            else if (olType === 'i') prefix = `${intToRoman(i+1).toLowerCase()}. `;
                            return `${prefix}${line}`;
                        }).join('\n');
                    } else {
                        newText = listPrefix;
                    }
                    cursorOffset = newText.length;
                    break;
                case 'quote':
                    newText = selectedText ? selectedText.split('\n').map(line => `> ${line}`).join('\n') : '> ';
                    cursorOffset = newText.length;
                    break;
                case 'code':
                    if(selectedText.includes('\n') || !selectedText) {
                        newText = `\`\`\`\n${selectedText || 'コードをここに記述'}\n\`\`\``;
                        cursorOffset = selectedText ? newText.length : 4;
                    } else {
                        newText = `\`${selectedText}\``;
                        cursorOffset = selectedText ? newText.length : 1;
                    }
                    break;
                case 'link':
                    newText = `[${selectedText || 'リンクテキスト'}](URL)`;
                    cursorOffset = selectedText ? newText.length - 1 : 1;
                    break;
            }

            const before = text.substring(0, start);
            const after = text.substring(end);
            editor.value = before + newText + after;
            editor.dispatchEvent(new Event('input'));
            editor.focus();
            
            if (selectedText) {
                editor.setSelectionRange(start, start + newText.length);
            } else {
                editor.setSelectionRange(start + cursorOffset, start + cursorOffset);
            }
        }

        function getCaretCoordinates(element, position) {
            const div = document.createElement('div');
            const style = div.style;
            const computed = window.getComputedStyle(element);

            style.whiteSpace = 'pre-wrap';
            style.wordWrap = 'break-word';
            style.position = 'absolute';
            style.visibility = 'hidden';

            const properties = [
                'direction', 'boxSizing', 'width', 'height', 'overflowX', 'overflowY',
                'borderTopWidth', 'borderRightWidth', 'borderBottomWidth', 'borderLeftWidth',
                'borderStyle', 'paddingTop', 'paddingRight', 'paddingBottom', 'paddingLeft',
                'fontStyle', 'fontVariant', 'fontWeight', 'fontStretch', 'fontSize', 'fontSizeAdjust',
                'lineHeight', 'fontFamily', 'textAlign', 'textTransform', 'textIndent',
                'textDecoration', 'letterSpacing', 'wordSpacing', 'tabSize', 'MozTabSize'
            ];

            properties.forEach(prop => { style[prop] = computed[prop]; });

            div.textContent = element.value.substring(0, position);
            const span = document.createElement('span');
            span.textContent = element.value.substring(position) || '.';
            div.appendChild(span);
            element.parentNode.appendChild(div);

            const coordinates = {
                top: span.offsetTop + parseInt(computed['borderTopWidth']),
                left: span.offsetLeft + parseInt(computed['borderLeftWidth']),
                height: parseInt(computed['lineHeight'])
            };

            element.parentNode.removeChild(div);
            return coordinates;
        }

        function handleSelection() {
            if (!editorPreview.classList.contains('hidden')) return;

            if (document.activeElement === editor) {
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                const text = editor.value.substring(start, end).trim();

                if (text.length > 0) {
                    selectionRange = { start, end, text };
                    showActionSheet();
                } else {
                    hideActionSheet();
                }
            }
        }

        function showActionSheet() {
            if (isProcessing || !selectionRange.text) return;
            
            aiActionSheet.classList.remove('hidden');
            
            requestAnimationFrame(() => {
                const coords = getCaretCoordinates(editor, selectionRange.end);
                
                let top = coords.top - editor.scrollTop + coords.height + 5;
                let left = coords.left - editor.scrollLeft;
                
                const width = aiActionSheet.offsetWidth;
                const height = aiActionSheet.offsetHeight;
                const containerRect = editor.parentNode.getBoundingClientRect();
                
                if (left + width > containerRect.width) left = containerRect.width - width - 10;
                if (top + height > containerRect.height) top = coords.top - editor.scrollTop - height - 5;
                
                left = Math.max(10, left);
                top = Math.max(10, top);

                aiActionSheet.style.transform = `translate(${left}px, ${top}px)`;
                aiActionSheet.style.opacity = '1';
                aiActionSheet.style.pointerEvents = 'auto';
            });
        }

        function hideActionSheet() {
            aiActionSheet.style.opacity = '0';
            aiActionSheet.style.pointerEvents = 'none';
            setTimeout(() => {
                if (aiActionSheet.style.opacity === '0') {
                    aiActionSheet.classList.add('hidden');
                }
            }, 200);
        }

        function insertTextAtCursor(text) {
            if (!editorPreview.classList.contains('hidden')) {
                togglePreviewMode(); 
            }
            const cursorPos = editor.selectionStart;
            const textBefore = editor.value.substring(0, cursorPos);
            const textAfter = editor.value.substring(cursorPos, editor.value.length);
            editor.value = textBefore + text + textAfter;
            editor.dispatchEvent(new Event('input'));
            editor.focus();
            editor.setSelectionRange(cursorPos + text.length, cursorPos + text.length);
        }

        // ==========================================
        // 目次生成ロジック
        // ==========================================
        function updateTOC() {
            const text = editor.value;
            const lines = text.split('\n');
            const headings = [];
            const regex = /^(#{1,6})\s+(.+)$/;

            lines.forEach((line, index) => {
                const match = line.match(regex);
                if (match) {
                    headings.push({
                        level: match[1].length,
                        text: match[2],
                        lineIndex: index
                    });
                }
            });

            if (headings.length === 0) {
                tocList.innerHTML = '<li class="text-slate-500 italic text-sm">本文に見出し(#)を追加すると目次が生成されます</li>';
                return;
            }

            tocList.innerHTML = '';
            headings.forEach(h => {
                const li = document.createElement('li');
                li.className = `cursor-pointer hover:text-primary transition truncate`;
                li.style.paddingLeft = `${(h.level - 1) * 12}px`;
                li.style.fontSize = h.level === 1 ? '0.95rem' : h.level === 2 ? '0.85rem' : '0.75rem';
                li.style.fontWeight = h.level === 1 ? 'bold' : 'normal';
                
                li.innerHTML = `<i class="fa-solid fa-chevron-right text-[10px] text-slate-300 mr-1"></i> ${h.text}`;
                li.addEventListener('click', () => {
                    if (!editorPreview.classList.contains('hidden')) togglePreviewMode(); 
                    scrollToLine(h.lineIndex);
                });
                tocList.appendChild(li);
            });
        }

        function scrollToLine(lineIndex) {
            const lines = editor.value.split('\n');
            let charCount = 0;
            for (let i = 0; i < lineIndex; i++) {
                charCount += lines[i].length + 1;
            }
            editor.focus();
            editor.setSelectionRange(charCount, charCount);
            const lineHeight = parseInt(window.getComputedStyle(editor).lineHeight);
            editor.scrollTop = lineIndex * lineHeight;
        }

        // ==========================================
        // AI処理ロジック
        // ==========================================
        async function handleAIAction(action) {
            hideActionSheet();
            if (!selectionRange.text) return;

            if (action === 'research') {
                showResearchModal();
                return;
            }

            const prompts = {
                clean: `以下の文章の誤字脱字を修正し、冗長な表現を省いて、きれいに整えてください。元の文脈やトーンは維持してください。結果のテキストのみを出力してください。\n\n${selectionRange.text}`,
                summarize: `以下の文章を簡潔に要約してください。重要なポイントが伝わるようにしてください。結果のテキストのみを出力してください。\n\n${selectionRange.text}`,
                refine: `以下の文章の表現をより専門的、かつ魅力的にブラッシュアップしてください。結果のテキストのみを出力してください。\n\n${selectionRange.text}`,
                structure: `以下の文章を、内容に応じて適切なマークダウン（見出し、箇条書き、太字など）を用いて構造化してください。結果のテキストのみを出力してください。\n\n${selectionRange.text}`
            };

            const prompt = prompts[action];
            const actionNames = { clean: 'きれい化', summarize: '要約', refine: '表現修整', structure: '構造化' };
            
            await processAIRequest(prompt, actionNames[action], 'replace');
        }

        function showResearchModal() {
            document.getElementById('research-prompt').value = '';
            document.getElementById('research-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('research-prompt').focus(), 100);
        }

        function hideResearchModal() {
            document.getElementById('research-modal').classList.add('hidden');
        }

        async function executeResearch() {
            const policy = document.getElementById('research-prompt').value;
            hideResearchModal();
            const prompt = `以下の文章と調査方針に基づいて、深掘り調査を行い、詳細なレポート（マークダウン形式）を作成してください。\n\n【対象文章】\n${selectionRange.text}\n\n【調査方針・追加指示】\n${policy || '全体的に深く掘り下げて解説してください。'}`;
            await processAIRequest(prompt, '深掘り調査', 'research');
        }

        async function processAIRequest(prompt, actionName, mode) {
            const apiKey = localStorage.getItem('geminiApiKey');
            if (!apiKey) {
                showToast('設定からGemini APIキーを登録してください', 'warning');
                document.getElementById('btn-settings').click();
                return;
            }

            isProcessing = true;
            const toastId = showToast(`${actionName}のAI処理を実行中...`, 'info', true);
            await saveVersion('ai', `AI処理前 (${actionName})`);

            try {
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error?.message || 'API通信エラー');
                }

                const data = await res.json();
                const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

                removeToast(toastId);

                if (mode === 'replace') {
                    const before = editor.value.substring(0, selectionRange.start);
                    const after = editor.value.substring(selectionRange.end);
                    editor.value = before + resultText + after;
                    editor.dispatchEvent(new Event('input'));
                    showToast(`${actionName}を適用しました`, 'success');
                    editor.setSelectionRange(selectionRange.start, selectionRange.start + resultText.length);
                    
                } else if (mode === 'research') {
                    const note = {
                        id: Date.now().toString(),
                        docId: currentDocId,
                        timestamp: new Date().toISOString(),
                        sourceText: selectionRange.text,
                        content: resultText
                    };
                    await dbResearch.setItem(note.id, note);
                    await loadResearchNotes();
                    document.querySelector('[data-target="tab-research"]').click();
                    showToast(`調査結果をノートに保存しました`, 'success');
                }

            } catch (error) {
                console.error(error);
                removeToast(toastId);
                showToast(`エラー: ${error.message}`, 'error');
            } finally {
                isProcessing = false;
            }
        }

        // ==========================================
        // AIチャットロジック
        // ==========================================
        async function sendChatMessage() {
            const apiKey = localStorage.getItem('geminiApiKey');
            if (!apiKey) {
                showToast('設定からGemini APIキーを登録してください', 'warning');
                document.getElementById('btn-settings').click();
                return;
            }

            const inputEl = document.getElementById('chat-input');
            const text = inputEl.value.trim();
            if (!text || isProcessing) return;
            
            inputEl.value = '';
            
            let promptText = text;
            const includeDoc = document.getElementById('chat-ctx-doc').checked;
            const includeSel = document.getElementById('chat-ctx-sel').checked;
            
            if (includeDoc || includeSel) {
                promptText = "以下のコンテキストを踏まえて質問に答えてください。\n\n";
                if (includeDoc) {
                    const fullDocText = `${docTitleInput.value}\n\n${currentContent}`;
                    promptText += `【ドキュメント全体】\n${fullDocText}\n\n`;
                }
                if (includeSel && selectionRange.text) promptText += `【選択中のテキスト】\n${selectionRange.text}\n\n`;
                promptText += `【質問・指示】\n${text}`;
            }

            const userMsg = { id: Date.now().toString(), docId: currentDocId, timestamp: new Date().toISOString(), role: 'user', content: text };
            await dbChat.setItem(userMsg.id, userMsg);
            await loadChatHistory();

            isProcessing = true;
            const toastId = showToast('AIが応答しています...', 'info', true);
            
            try {
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });
                
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error?.message || 'API通信エラー');
                }
                
                const data = await res.json();
                const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

                const aiMsg = { id: Date.now().toString(), docId: currentDocId, timestamp: new Date().toISOString(), role: 'ai', content: resultText };
                await dbChat.setItem(aiMsg.id, aiMsg);
                await loadChatHistory();
                
            } catch (error) {
                console.error(error);
                showToast(`チャット通信エラー: ${error.message}`, 'error');
            } finally {
                isProcessing = false;
                removeToast(toastId);
            }
        }

        async function loadChatHistory() {
            const keys = await dbChat.keys();
            const messages = [];
            for (let key of keys) {
                const item = await dbChat.getItem(key);
                if (item.docId === currentDocId) messages.push(item);
            }
            messages.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            const chatList = document.getElementById('chat-list');
            chatList.innerHTML = '';
            
            if (messages.length === 0) {
                chatList.innerHTML = '<p class="text-sm text-slate-500 italic mt-2">AIに質問や指示を出せます</p>';
                return;
            }

            messages.forEach(msg => {
                const el = document.createElement('div');
                const isUser = msg.role === 'user';
                el.className = `flex flex-col gap-1 ${isUser ? 'items-end' : 'items-start'}`;
                
                let contentHtml = isUser ? msg.content.replace(/\n/g, '<br>') : marked.parse(msg.content);
                let insertBtn = isUser ? '' : `<button class="btn-insert-chat text-[10px] text-primary font-medium hover:underline mt-1 self-end"><i class="fa-solid fa-file-import"></i> 本文に挿入</button>`;

                el.innerHTML = `
                    <span class="text-[10px] text-slate-400 font-bold px-1">${isUser ? 'あなた' : 'AIアシスタント'}</span>
                    <div class="${isUser ? 'bg-primary text-white' : 'bg-white border border-slate-200 text-slate-700'} p-2.5 rounded-xl text-sm max-w-[90%] shadow-sm ${!isUser ? 'prose prose-sm max-w-none' : ''}" style="word-break: break-word;">
                        ${contentHtml}
                    </div>
                    ${insertBtn}
                `;

                if (!isUser) {
                    el.querySelector('.btn-insert-chat').addEventListener('click', () => {
                        insertTextAtCursor(`\n${msg.content}\n`);
                        showToast('回答を本文に挿入しました', 'success');
                    });
                }
                
                chatList.appendChild(el);
            });
            chatList.scrollTop = chatList.scrollHeight;
        }

        // ==========================================
        // データ管理ロジック
        // ==========================================
        async function loadDocumentList() {
            let list = await dbDocList.getItem('list') || [];
            
            if (list.length === 0) {
                const initDoc = { id: 'doc_' + Date.now(), title: '無題のドキュメント', updatedAt: Date.now() };
                list.push(initDoc);
                await dbDocList.setItem('list', list);
                currentDocId = initDoc.id;
            } else {
                if (!currentDocId || !list.find(d => d.id === currentDocId)) {
                    currentDocId = list[0].id;
                }
            }
            
            renderDocList(list);
            await loadDocument();
        }

        async function createNewDocument() {
            await saveDocument();
            let list = await dbDocList.getItem('list') || [];
            const newId = 'doc_' + Date.now();
            list.push({ id: newId, title: '無題のドキュメント', updatedAt: Date.now() });
            await dbDocList.setItem('list', list);
            
            currentDocId = newId;
            editor.value = '';
            currentContent = '';
            docTitleInput.value = '';
            
            renderDocList(list);
            await saveDocument();
            await saveVersion('init', '初期作成');
            
            if (!editorPreview.classList.contains('hidden')) {
                togglePreviewMode(); 
            }
            
            updateTOC();
            await loadHistory();
            await loadResearchNotes();
            await loadChatHistory();

            if (window.innerWidth <= 768) document.getElementById('btn-close-left-sidebar').click();
        }

        async function deleteDocument(id) {
            let list = await dbDocList.getItem('list') || [];
            list = list.filter(d => d.id !== id);
            await dbDocList.setItem('list', list);
            await dbDoc.removeItem(id);
            
            const stores = [dbHistory, dbResearch, dbChat];
            for(let store of stores) {
                const keys = await store.keys();
                for(let k of keys) {
                    const item = await store.getItem(k);
                    if(item.docId === id) await store.removeItem(k);
                }
            }

            if (list.length === 0) {
                await createNewDocument();
            } else {
                currentDocId = list[0].id;
                renderDocList(list);
                await loadDocument();
            }
        }

        function renderDocList(list) {
            docListEl.innerHTML = '';
            list.sort((a, b) => b.updatedAt - a.updatedAt);
            
            list.forEach(doc => {
                const div = document.createElement('div');
                const isActive = doc.id === currentDocId;
                div.className = `p-2 rounded cursor-pointer text-sm flex justify-between items-center group transition ${isActive ? 'bg-primary/10 text-primary font-bold' : 'text-slate-600 hover:bg-slate-100'}`;
                
                // モバイルでも削除ボタンにアクセスしやすいように、opacity クラスを調整
                div.innerHTML = `
                    <div class="truncate flex-1 btn-switch-doc pr-2">
                        <i class="fa-regular fa-file-lines mr-2 ${isActive ? 'text-primary' : 'text-slate-400'}"></i>${doc.title}
                    </div>
                    <button class="btn-delete-doc text-slate-400 hover:text-red-500 px-2 md:opacity-0 md:group-hover:opacity-100 opacity-100 transition ${isActive ? '' : 'hidden'}" title="削除">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                `;
                
                div.querySelector('.btn-switch-doc').addEventListener('click', async () => {
                    if (currentDocId !== doc.id) {
                        await saveDocument(); 
                        currentDocId = doc.id;
                        renderDocList(await dbDocList.getItem('list'));
                        await loadDocument();
                        if (window.innerWidth <= 768) document.getElementById('btn-close-left-sidebar').click();
                    }
                });
                
                const deleteBtn = div.querySelector('.btn-delete-doc');
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        if (confirm(`「${doc.title}」を削除しますか？`)) await deleteDocument(doc.id);
                    });
                }
                docListEl.appendChild(div);
            });
        }

        async function loadDocument() {
            if (!currentDocId) return;
            
            const list = await dbDocList.getItem('list') || [];
            const docMeta = list.find(d => d.id === currentDocId);
            if (docMeta) {
                docTitleInput.value = docMeta.title === '無題のドキュメント' ? '' : docMeta.title;
            }

            const doc = await dbDoc.getItem(currentDocId);
            if (doc) {
                editor.value = doc.content || '';
                currentContent = doc.content || '';
                updateSaveStatus("保存済", "text-slate-400", "fa-cloud-check");
            } else {
                editor.value = '';
                currentContent = '';
                await saveDocument();
                await saveVersion('init', '初期作成');
            }

            if (!editorPreview.classList.contains('hidden')) {
                const titleMarkdown = docTitleInput.value.trim() ? `# ${docTitleInput.value.trim()}\n\n` : '';
                editorPreview.innerHTML = marked.parse(titleMarkdown + (editor.value || '*何も書かれていません*'));
            }

            updateTOC();
            await loadHistory();
            await loadResearchNotes();
            await loadChatHistory();
        }

        async function saveDocument() {
            if (!currentDocId) return;
            const content = editor.value;
            const titleVal = docTitleInput.value.trim();
            const docTitle = titleVal || '無題のドキュメント';

            const doc = { id: currentDocId, content: content, lastModified: new Date().toISOString() };
            await dbDoc.setItem(currentDocId, doc);
            
            let list = await dbDocList.getItem('list') || [];
            const docMeta = list.find(d => d.id === currentDocId);
            if (docMeta) {
                if (docMeta.title !== docTitle) {
                    docMeta.title = docTitle;
                    docMeta.updatedAt = Date.now();
                    await dbDocList.setItem('list', list);
                    renderDocList(list);
                } else {
                    docMeta.updatedAt = Date.now();
                    await dbDocList.setItem('list', list);
                }
            }
            updateSaveStatus("保存済", "text-slate-400", "fa-cloud-check");
        }

        function updateSaveStatus(text, colorClass, iconClass) {
            saveStatus.className = `text-xs ml-2 ${colorClass}`;
            saveStatus.innerHTML = `<i class="fa-solid ${iconClass}"></i> ${text}`;
        }

        async function saveVersion(reason, description) {
            if (!currentDocId) return;
            const content = editor.value;
            const titleVal = docTitleInput.value.trim();
            if(!content && !titleVal) return;

            const savedContent = titleVal ? `# ${titleVal}\n\n${content}` : content;

            const version = {
                id: Date.now().toString(),
                docId: currentDocId,
                timestamp: new Date().toISOString(),
                content: savedContent,
                reason: reason,
                description: description
            };

            await dbHistory.setItem(version.id, version);
            await loadHistory();
        }

        async function loadHistory() {
            const keys = await dbHistory.keys();
            const versions = [];
            for (let key of keys) {
                const item = await dbHistory.getItem(key);
                if (item.docId === currentDocId || !item.docId) versions.push(item);
            }
            versions.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            historyList.innerHTML = '';
            if (versions.length === 0) {
                historyList.innerHTML = '<p class="text-sm text-slate-500 italic">履歴がありません</p>';
                return;
            }

            versions.forEach(v => {
                const date = new Date(v.timestamp);
                const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                
                let icon = 'fa-clock';
                let color = 'text-slate-500';
                if(v.reason === 'ai') { icon = 'fa-robot'; color = 'text-indigo-500'; }
                if(v.reason === 'manual') { icon = 'fa-save'; color = 'text-green-500'; }
                if(v.reason === 'auto') { icon = 'fa-rotate'; color = 'text-blue-500'; }

                const el = document.createElement('div');
                el.className = 'bg-white p-2 rounded-lg border border-slate-100 shadow-sm text-sm group relative';
                el.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-bold text-slate-700 text-xs"><i class="fa-solid ${icon} ${color} mr-1"></i>${v.description}</span>
                        <span class="text-[10px] text-slate-400">${timeStr}</span>
                    </div>
                    <div class="text-xs text-slate-500 truncate mb-2">${v.content.substring(0, 30)}...</div>
                    <button class="btn-restore w-full py-1 text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 rounded transition hidden group-hover:block" data-id="${v.id}">
                        <i class="fa-solid fa-clock-rotate-left"></i> このバージョンを復元
                    </button>
                `;
                
                el.querySelector('.btn-restore').addEventListener('click', async () => {
                    if(confirm('現在の状態を上書きして復元しますか？（現在の状態は自動保存されます）')) {
                        await saveVersion('auto', '復元前のバックアップ');
                        
                        let text = v.content;
                        if(text.startsWith('# ')) {
                            const firstLineEnd = text.indexOf('\n');
                            if(firstLineEnd !== -1) {
                                docTitleInput.value = text.substring(2, firstLineEnd).trim();
                                text = text.substring(firstLineEnd).trimStart();
                            } else {
                                docTitleInput.value = text.substring(2).trim();
                                text = "";
                            }
                        }
                        
                        editor.value = text;
                        currentContent = text;
                        await saveDocument();
                        updateTOC();
                        showToast('バージョンを復元しました', 'success');
                        
                        if (!editorPreview.classList.contains('hidden')) {
                            togglePreviewMode(); 
                        }
                        if(window.innerWidth <= 768) document.getElementById('btn-toggle-sidebar').click();
                    }
                });

                historyList.appendChild(el);
            });
        }

        async function loadResearchNotes() {
            const keys = await dbResearch.keys();
            const notes = [];
            for (let key of keys) {
                const item = await dbResearch.getItem(key);
                if (item.docId === currentDocId || !item.docId) notes.push(item);
            }
            notes.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            researchList.innerHTML = '';
            if (notes.length === 0) {
                researchList.innerHTML = '<p class="text-sm text-slate-500 italic">「深掘り調査」の結果がここに保存されます。</p>';
                return;
            }

            notes.forEach(note => {
                const date = new Date(note.timestamp);
                const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                
                const el = document.createElement('div');
                el.className = 'bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-2';
                
                const htmlContent = marked.parse(note.content);

                el.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                        <span class="text-xs font-bold text-indigo-600"><i class="fa-solid fa-magnifying-glass mr-1"></i>調査結果</span>
                        <span class="text-[10px] text-slate-400">${timeStr}</span>
                    </div>
                    <div class="text-xs text-slate-500 bg-slate-50 p-2 rounded line-clamp-2 italic">対象: ${note.sourceText}</div>
                    <div class="text-sm prose prose-sm max-w-none max-h-48 overflow-y-auto custom-scrollbar my-1">${htmlContent}</div>
                    <div class="flex justify-between mt-2 pt-2 border-t border-slate-100">
                        <button class="btn-delete-note text-xs text-slate-400 hover:text-red-500 px-2 py-1"><i class="fa-solid fa-trash"></i></button>
                        <button class="btn-insert-note text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold py-1 px-3 rounded transition">
                            <i class="fa-solid fa-file-import"></i> 本文に挿入
                        </button>
                    </div>
                `;

                el.querySelector('.btn-insert-note').addEventListener('click', () => {
                    insertTextAtCursor(`\n\n> **深掘り調査結果**\n${note.content}\n\n`);
                    showToast('調査結果を本文に挿入しました', 'success');
                    if(window.innerWidth <= 768) document.getElementById('btn-toggle-sidebar').click();
                });

                el.querySelector('.btn-delete-note').addEventListener('click', async () => {
                    if(confirm('この調査ノートを削除しますか？')) {
                        await dbResearch.removeItem(note.id);
                        await loadResearchNotes();
                    }
                });

                researchList.appendChild(el);
            });
        }

        // ==========================================
        // トースト通知ロジック
        // ==========================================
        function showToast(message, type = 'info', isPersistent = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const id = 'toast-' + Date.now();
            toast.id = id;
            
            let bgClass = 'bg-slate-800 text-white';
            let icon = 'fa-info-circle';
            if(type === 'success') { bgClass = 'bg-green-600 text-white'; icon = 'fa-check-circle'; }
            if(type === 'error') { bgClass = 'bg-red-500 text-white'; icon = 'fa-exclamation-triangle'; }
            if(type === 'warning') { bgClass = 'bg-amber-500 text-white'; icon = 'fa-exclamation-circle'; }

            toast.className = `toast-enter ${bgClass} px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 pointer-events-auto`;
            const iconHtml = isPersistent ? `<i class="fa-solid fa-circle-notch fa-spin"></i>` : `<i class="fa-solid ${icon}"></i>`;

            toast.innerHTML = `${iconHtml}<span class="text-sm font-medium flex-1">${message}</span>`;
            container.appendChild(toast);

            if (!isPersistent) setTimeout(() => removeToast(id), 3000);
            return id;
        }

        function removeToast(id) {
            const toast = document.getElementById(id);
            if (toast) {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }
        }

        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
